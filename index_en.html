  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ═══════════════════════ DATA ═══════════════════════ */

    const CATEGORIES = {
      FM: { name: "Foundation Models", color: "#C62828", light: "#FFEBEE", mid: "#EF9A9A" },
      AR: { name: "Architectures", color: "#E65100", light: "#FFF3E0", mid: "#FFCC80" },
      LP: { name: "Learning Paradigms", color: "#9E7A15", light: "#FFF8E1", mid: "#FFE082" },
      DA: { name: "Data & Processing", color: "#00695C", light: "#E0F2F1", mid: "#80CBC4" },
      TF: { name: "Tools & Frameworks", color: "#37474F", light: "#ECEFF1", mid: "#B0BEC5" },
      AP: { name: "Applications", color: "#6A1B9A", light: "#F3E5F5", mid: "#CE93D8" },
      ES: { name: "Ethics & Safety", color: "#BF360C", light: "#FBE9E7", mid: "#FFAB91" },
      IN: { name: "Infrastructure", color: "#1565C0", light: "#E3F2FD", mid: "#90CAF9" },
      AG: { name: "Agents &Tic", color: "#00838F", light: "#E0F7FA", mid: "#80DEEA" },
      NL: { name: "NLP & Language", color: "#283593", light: "#E8EAF6", mid: "#9FA8DA" },
    };

    const elements = [
      { sym: "GPT", num: 1, name: "Gen. Pre-trained Transformer", cat: "FM", row: 0, col: 0, desc: "OpenAI's language model family and the most commercially successful LLM worldwide. From GPT-3.5 through GPT-4 to GPT-4o and the reasoning models o1/o3, each generation brought breakthroughs in text, code, and multimodal understanding. GPT models power ChatGPT, Microsoft Copilot, and thousands of API integrations. The architecture is based on decoder-only transformers with autoregressive next-token prediction." },
      { sym: "Cld", num: 2, name: "Claude", cat: "FM", row: 0, col: 1, desc: "Anthropic's AI assistant, built with the goal of maximum safety and helpfulness. Claude uses Constitutional AI (CAI) as its alignment method, where the model is trained according to a constitution of ethical principles. With over 200,000 token context window, Claude excels at long documents, complex analyses, and code. Claude Code enables agentic coding directly in the terminal." },
      { sym: "Gem", num: 3, name: "Gemini", cat: "FM", row: 0, col: 14, desc: "Google DeepMind's multimodal flagship model that natively processes text, image, audio, and video in a single architecture. Gemini was designed multimodal from the ground up — not as a fusion of separate models. The family includes Ultra, Pro, and Flash variants for different performance requirements. Gemini is deeply integrated into Google's product ecosystem: Search, Workspace, Android, and Cloud." },
      { sym: "Lla", num: 4, name: "LLaMA", cat: "FM", row: 0, col: 15, desc: "Meta's open-source LLM family that has significantly shaped the ecosystem of open language models. LLaMA models are extensively fine-tuned by the community — Alpaca, Vicuna, and thousands of variants are built on top. The open license enables commercial use and has fueled competition between open and closed-source models. LLaMA 3 was the first to reach GPT-4 level in many benchmarks." },
      { sym: "Mis", num: 5, name: "Mistral", cat: "FM", row: 0, col: 16, desc: "European AI company from Paris disrupting the market with efficient open-source models. Mistral uses Mixture-of-Experts (MoE) architecture to deliver high quality with less active compute. The models are particularly fast in inference, ideal for latency-sensitive applications. As a European company, Mistral plays an important role in the digital sovereignty debate." },
      { sym: "Grk", num: 6, name: "Grok", cat: "FM", row: 0, col: 17, desc: "xAI's language model, founded by Elon Musk as an alternative to OpenAI. Grok has exclusive real-time access to X/Twitter data, making it particularly useful for current events and trending topics. The model is known for its direct, humorous communication style. Grok is offered as open-source and trained on xAI's own Colossus GPU infrastructure." },
      { sym: "Trf", num: 7, name: "Transformer", cat: "AR", row: 1, col: 0, desc: "The architecture that ignited the AI revolution in 2017 — introduced in 'Attention Is All You Need' by Google. Transformers replace recurrent networks with parallel self-attention mechanisms, enabling dramatically faster training. Virtually every modern language model (GPT, Claude, Gemini, LLaMA) is based on this architecture. The key lies in its ability to capture arbitrarily long dependencies in sequences." },
      { sym: "Att", num: 8, name: "Self-Attention", cat: "AR", row: 1, col: 1, desc: "The core mechanism of modern transformer architectures. Self-attention computes for each token how much it should attend to every other token — a weighted sum of all context information. This allows the model to draw relevant information from any position in the input, regardless of distance. Computational costs scale quadratically with sequence length, driving development of more efficient variants like Flash Attention." },
      { sym: "CNN", num: 9, name: "Convolutional NN", cat: "AR", row: 1, col: 2, desc: "Convolutional Neural Networks revolutionized image recognition from 2012 and dominated computer vision for years. CNNs use learnable filters (kernels) that slide across images, hierarchically extracting features from edges to textures to complex objects. Architectures like ResNet, VGG, and EfficientNet became standards. Although Vision Transformers (ViT) have surpassed CNNs in many benchmarks, CNNs remain relevant for edge devices due to their efficiency." },
      { sym: "RNN", num: 10, name: "Recurrent NN", cat: "AR", row: 1, col: 3, desc: "Recurrent Neural Networks process sequences step by step, maintaining information in a hidden state. LSTMs (Long Short-Term Memory) and GRUs (Gated Recurrent Units) solved the vanishing gradient problem, enabling learning of long-range dependencies. RNNs were the standard for language processing, machine translation, and time series analysis for years. Since 2017, they have been largely replaced by Transformers but still find use in specialized applications." },
      { sym: "GAN", num: 11, name: "Gen. Adversarial Net", cat: "AR", row: 1, col: 4, desc: "Generative Adversarial Networks consist of two networks in competition: a Generator creates fake data, a Discriminator tries to detect fakes. Through this adversarial training, the Generator learns to produce increasingly realistic data. GANs were groundbreaking for image generation (StyleGAN, BigGAN), super-resolution, and data synthesis. The architecture is notorious for unstable training (mode collapse) and has been largely superseded by Diffusion Models for image generation." },
      { sym: "VAE", num: 12, name: "Variational Autoencoder", cat: "AR", row: 1, col: 5, desc: "Variational Autoencoders learn a compressed, probabilistic representation of data in a latent space. The encoder compresses input into a Gaussian distribution, the decoder reconstructs new samples from it. VAEs are theoretically elegant and enable controlled generation through interpolation in latent space. They form a building block of Latent Diffusion Models (e.g., Stable Diffusion), where the VAE encoder compresses images into latent space." },
      { sym: "Dif", num: 13, name: "Diffusion Models", cat: "AR", row: 1, col: 6, desc: "Diffusion Models learn to progressively remove noise from an image — an iterative denoising process. The technique is based on thermodynamic principles and delivers higher quality, more stable results than GANs. Diffusion is the architecture behind DALL-E 3, Stable Diffusion, Midjourney, and virtually all modern image generators. The downside is slow inference due to many denoising steps, driving development of techniques like DDIM and Consistency Models." },
      { sym: "MoE", num: 14, name: "Mixture of Experts", cat: "AR", row: 1, col: 7, desc: "Mixture of Experts (MoE) activates only a small portion of the total model per input through learned routing. A gating network decides which expert sub-networks handle each token — typically 2 out of 64 experts. This enables models with massive total capacity at moderate compute cost per inference. Mixtral from Mistral and Google's Switch Transformer use MoE, and GPT-4 is also believed to be an MoE model." },
      { sym: "SSM", num: 15, name: "State Space Model", cat: "AR", row: 1, col: 10, desc: "State Space Models like Mamba offer an alternative to Transformers with linear rather than quadratic complexity. They are based on linear dynamical systems theory and can efficiently process sequences without attention mechanisms. SSMs show particular advantages for very long contexts (>100k tokens) in speed and memory usage. Hybrid architectures combining SSM layers with attention layers are gaining increasing popularity." },
      { sym: "GNN", num: 16, name: "Graph Neural Net", cat: "AR", row: 1, col: 11, desc: "Graph Neural Networks learn on data structured as graphs — nodes with connections (edges). Through message passing, nodes exchange information with their neighbors and update their representations. GNNs are used for molecular design (protein structure), social network analysis, recommender systems, and fraud detection. Architectures like GCN, GAT, and GraphSAGE address different graph types and scaling requirements." },
      { sym: "MHd", num: 17, name: "Multi-Head Attention", cat: "AR", row: 1, col: 12, desc: "Multi-Head Attention performs self-attention multiple times in parallel with different learned projections. Each attention head can learn different relationship patterns — one focuses on syntactic proximity, another on semantic similarity. Results from all heads are concatenated and linearly projected. GPT-4 presumably uses over 100 attention heads per layer, enabling extremely rich context modeling." },
      { sym: "KVc", num: 18, name: "KV-Cache", cat: "AR", row: 1, col: 13, desc: "KV-Cache stores previously computed Key and Value vectors during autoregressive generation. Without KV-Cache, the entire attention over all previous tokens would need to be recomputed for each new token. The cache eliminates this redundant computation and dramatically accelerates token generation. However, memory requirements grow linearly with sequence length, which is why techniques like PagedAttention (vLLM) intelligently manage cache memory." },
      { sym: "LoR", num: 19, name: "LoRA", cat: "AR", row: 1, col: 14, desc: "Low-Rank Adaptation (LoRA) enables efficient fine-tuning by training only small additional matrices. Instead of modifying all billions of parameters, LoRA adds two small matrices per layer (rank 4-64). This reduces fine-tuning memory requirements by 90%+ and enables adaptation on consumer GPUs. QLoRA combines LoRA with quantization, making fine-tuning of 70B models possible on a single GPU." },
      { sym: "QAn", num: 20, name: "Quantization", cat: "AR", row: 1, col: 15, desc: "Quantization compresses model weights from 32-bit or 16-bit floating point to 8-bit, 4-bit, or even 2-bit integers. This dramatically reduces memory requirements and inference costs — a 70B model fits quantized on a single consumer GPU. Modern quantization methods like GPTQ, AWQ, and GGUF preserve model quality remarkably well. The technique is crucial for local LLM use and edge deployment." },
      { sym: "Emb", num: 21, name: "Embeddings", cat: "AR", row: 1, col: 16, desc: "Embeddings translate discrete concepts (words, sentences, images) into dense vectors where semantic similarity is mapped as geometric proximity. Similar meanings are close together in high-dimensional space — 'king' minus 'man' plus 'woman' roughly equals 'queen'. Embeddings are fundamental for RAG systems, search engines, and recommendation systems. Models like OpenAI ada-002, Cohere Embed, and Sentence-BERT produce high-quality text embeddings." },
      { sym: "Tok", num: 22, name: "Tokenizer", cat: "AR", row: 1, col: 17, desc: "Tokenizers split text into sub-word units (tokens) that the model processes as input. Byte-Pair Encoding (BPE), SentencePiece, and WordPiece are common methods that merge frequent character combinations into single tokens. The choice of tokenizer significantly affects efficiency, multilingual support, and context window utilization. A typical word requires 1-3 tokens; programming languages and non-Latin scripts are often less efficiently tokenized." },
      { sym: "SuL", num: 23, name: "Supervised Learning", cat: "LP", row: 2, col: 0, desc: "Supervised Learning is the most classic form of machine learning: the model learns from input-output pairs. Each training example has a label — cat/dog, spam/ham, price. The model minimizes the error between prediction and label via gradient descent. Supervised learning is the basis for classification, regression, and also the pre-training phase of LLMs (next token as label)." },
      { sym: "UsL", num: 24, name: "Unsupervised Learning", cat: "LP", row: 2, col: 1, desc: "Unsupervised Learning discovers structures and patterns in data without predefined labels. Clustering algorithms (K-Means, DBSCAN, HDBSCAN) group similar data points, dimensionality reduction (PCA, t-SNE, UMAP) visualizes high-dimensional data. Anomaly detection identifies outliers without knowing what 'normal' looks like. In practice, unsupervised learning is often used for data exploration, feature engineering, and as a precursor to supervised learning." },
      { sym: "RfL", num: 25, name: "Reinforcement Learning", cat: "LP", row: 2, col: 2, desc: "Reinforcement Learning trains an agent that learns an optimal strategy (policy) through interaction with an environment. The agent receives rewards for good actions and penalties for bad ones, maximizing cumulative reward. RL was crucial for AlphaGo, robotics control, and game playing (Atari, StarCraft). In LLMs, RL forms the basis for RLHF — fine-tuning language models to human preferences." },
      { sym: "SSL", num: 26, name: "Self-Supervised", cat: "LP", row: 2, col: 3, desc: "Self-Supervised Learning generates training signals directly from the data itself, without manually created labels. In Masked Language Modeling (BERT), random words are masked and the model learns to predict them; in autoregressive training (GPT), it predicts the next token. Contrastive Learning (CLIP, SimCLR) learns which data pairs belong together. These paradigms enable training on massive unlabeled datasets — the foundation of all Foundation Models." },
      { sym: "TrL", num: 27, name: "Transfer Learning", cat: "LP", row: 2, col: 4, desc: "Transfer Learning transfers knowledge learned on one task to a new, related task. A model pre-trained on millions of images can be adapted for medical image analysis with just a few hundred examples. This paradigm is the core of the Foundation Model approach: train expensively once, specialize cheaply many times. Transfer Learning has massively lowered the barrier for AI applications since not every company needs to train from scratch." },
      { sym: "FwL", num: 28, name: "Few-Shot Learning", cat: "LP", row: 2, col: 5, desc: "Few-Shot Learning enables models to learn from just a handful of examples (1-10). In LLMs, this happens via In-Context Learning: examples are provided as part of the prompt without changing model weights. GPT-3 first demonstrated in 2020 that large language models have impressive few-shot capabilities. In computer vision, techniques like Siamese Networks and Prototypical Networks use metric learning for few-shot classification." },
      { sym: "ZeS", num: 29, name: "Zero-Shot", cat: "LP", row: 2, col: 6, desc: "Zero-Shot capability means a model can solve tasks for which it has seen no explicit examples. The model generalizes purely through language understanding — 'Classify this text as positive or negative' works without training examples for sentiment. CLIP demonstrated zero-shot image recognition: classifying images into arbitrary categories without ever being trained on them. Zero-Shot is a strong indicator of genuine language understanding and generalization ability." },
      { sym: "RHF", num: 30, name: "RLHF", cat: "LP", row: 2, col: 7, desc: "Reinforcement Learning from Human Feedback is the technique that made ChatGPT possible — aligning LLMs with human preferences. Humans rate different model responses (better/worse), a reward model is trained from these ratings, which then optimizes the language model via RL. RLHF makes models more helpful, honest, and safe, but can also lead to excessive caution (refusals) or sycophancy (too much agreement). The technique was primarily developed and refined by OpenAI and Anthropic." },
      { sym: "DPO", num: 31, name: "Direct Preference Opt.", cat: "LP", row: 2, col: 8, desc: "Direct Preference Optimization (DPO) simplifies RLHF by eliminating the detour through a separate reward model. Instead of using RL, DPO optimizes the language model directly from preference pairs (preferred vs. rejected response). DPO is mathematically equivalent to a specific form of RLHF but simpler to implement and more stable in training. Many newer models use DPO or variants like IPO and KTO for their alignment." },
      { sym: "CoT", num: 32, name: "Chain-of-Thought", cat: "LP", row: 2, col: 9, desc: "Chain-of-Thought prompting gets LLMs to think through problems step by step before giving an answer. Through instructions like 'Think step by step' or examples with explicit reasoning processes, accuracy on math and logic tasks increases dramatically. OpenAI's o1 model internalizes Chain-of-Thought as a hidden reasoning process automatically activated for complex tasks. CoT shows that LLMs 'think' better when they can externalize their thinking process." },
      { sym: "ICL", num: 33, name: "In-Context Learning", cat: "LP", row: 2, col: 10, desc: "In-Context Learning is the remarkable ability of large LLMs to learn from examples in the prompt — without any weight changes. You provide the model with some input-output pairs and it extrapolates the pattern to new inputs. This emergent behavior only appears above a certain model size and is not yet fully understood theoretically. ICL makes LLMs extremely flexible: new tasks require only new prompts, no retraining." },
      { sym: "CuL", num: 34, name: "Curriculum Learning", cat: "LP", row: 2, col: 11, desc: "Curriculum Learning organizes training data from easy to hard, analogous to human learning. The model first masters simple examples and is gradually confronted with more complex ones. Studies show faster convergence and sometimes better generalization compared to random training. In the LLM world, curriculum learning is used in pre-training data mixing — e.g., higher quality data in later training phases." },
      { sym: "FdL", num: 35, name: "Federated Learning", cat: "LP", row: 2, col: 12, desc: "Federated Learning trains ML models in a decentralized manner across distributed devices without centralizing raw data. Each device (smartphone, hospital server) trains locally and shares only model updates (gradients) with a central server. Apple uses federated learning for keyboard predictions, Google for Gboard — user privacy is preserved. The technique is particularly relevant for healthcare data, financial institutions, and other privacy-sensitive domains." },
      { sym: "MtL", num: 36, name: "Meta-Learning", cat: "LP", row: 2, col: 13, desc: "Meta-Learning — 'learning to learn' — trains models that can quickly adapt to entirely new tasks. Algorithms like MAML (Model-Agnostic Meta-Learning) optimize model initializations from which few gradient updates suffice for a new task. Meta-Learning is related to Few-Shot Learning and aims for generalized learning ability rather than individual tasks. In robotics, it enables robots to learn new manipulation tasks in just a few attempts." },
      { sym: "CtL", num: 37, name: "Contrastive Learning", cat: "LP", row: 2, col: 14, desc: "Contrastive Learning trains models by comparing similar (positive) and dissimilar (negative) data pairs. The model learns to pull positive pairs together in embedding space and push negative ones apart. CLIP uses contrastive learning between image-text pairs, SimCLR between augmented versions of the same image. The technique is central to self-supervised learning and produces excellent representations without manual labels." },
      { sym: "DiT", num: 38, name: "Distillation", cat: "LP", row: 2, col: 15, desc: "Knowledge Distillation transfers knowledge from a large, powerful teacher model to a smaller, faster student model. The student learns not only the correct answers but also the probability distributions (soft labels) of the teacher — containing richer knowledge. DistilBERT achieves 97% of BERT's performance at 60% of the size. Distillation is crucial for deploying AI on mobile devices and resource-constrained environments." },
      { sym: "FnT", num: 39, name: "Fine-Tuning", cat: "LP", row: 2, col: 16, desc: "Fine-Tuning adapts a pre-trained Foundation Model to specific tasks or domains by training on domain-specific data. Full fine-tuning updates all weights; parameter-efficient methods (LoRA, adapters) modify only a fraction. Instruction fine-tuning teaches base models to follow instructions — the step that turned GPT-3 into InstructGPT. The quality and diversity of fine-tuning data largely determines model quality." },
      { sym: "PrT", num: 40, name: "Pre-Training", cat: "LP", row: 2, col: 17, desc: "Pre-Training is the initial, compute-intensive phase where a Foundation Model is trained on massive data. For LLMs, this typically means next-token prediction on trillions of text tokens from web crawls, books, and code. This phase costs millions of dollars in GPU hours and produces a base model with broad world knowledge. The quality and composition of pre-training data (data mix) is one of the most guarded secrets of AI labs." },
      { sym: "RAG", num: 41, name: "Retrieval-Augmented Gen.", cat: "DA", row: 3, col: 0, desc: "Retrieval-Augmented Generation combines LLMs with external knowledge search to produce more current and fact-based answers. Instead of relying solely on trained knowledge, RAG retrieves relevant documents from a knowledge base and adds them as context to the prompt. This drastically reduces hallucinations and enables incorporating proprietary enterprise knowledge without retraining the model. RAG is the de facto standard for enterprise AI applications and chatbots with domain-specific knowledge." },
      { sym: "VeD", num: 42, name: "Vector Database", cat: "DA", row: 3, col: 1, desc: "Vector databases store and search embedding vectors with highly efficient nearest-neighbor algorithms. Pinecone, Weaviate, Chroma, Qdrant, Milvus, and pgvector are the best-known options for different scaling requirements. Search is based on similarity measures like cosine similarity or dot product, finding semantically related content in milliseconds. Vector databases are the backbone of every RAG system and semantic search." },
      { sym: "FtE", num: 43, name: "Feature Engineering", cat: "DA", row: 3, col: 2, desc: "Feature Engineering is the art of transforming raw data into informative features for ML models. Classic techniques include normalization, one-hot encoding, binning, aggregation, and domain-specific calculations. Good feature engineering can improve model performance more than switching algorithms. In the deep learning era, neural networks increasingly handle automatic feature extraction, but for tabular data, manual feature engineering remains critical." },
      { sym: "DAu", num: 44, name: "Data Augmentation", cat: "DA", row: 3, col: 3, desc: "Data Augmentation artificially creates new training data through transformations of existing examples. For images: rotation, flipping, cropping, color changes, cutout. For text: paraphrasing, synonym replacement, back-translation, LLM-generated variants. Augmentation prevents overfitting and improves generalization, especially with small datasets. RandAugment and AugMax automate the selection of optimal augmentation strategies." },
      { sym: "ETL", num: 45, name: "ETL Pipeline", cat: "DA", row: 3, col: 4, desc: "ETL pipelines (Extract, Transform, Load) automate data flow from raw sources to training-ready datasets. Extract collects data from APIs, databases, web scraping, and file systems. Transform cleans, normalizes, deduplicates, and structures the data. Load stores it in formats that ML frameworks can read efficiently. Tools like Apache Spark, dbt, Airflow, and Dagster orchestrate these pipelines." },
      { sym: "LaD", num: 46, name: "Labeling", cat: "DA", row: 3, col: 5, desc: "Labeling is the often underestimated bottleneck in ML training: humans annotate data with correct categories or markings. RLHF annotation requires raters to rank model responses by quality — a subjective, expensive task. Bounding boxes for object detection, named entity tags for NLP, segmentation masks for images — each ML use case has its own annotation requirements. Platforms like Scale AI, Labelbox, and Amazon Mechanical Turk have professionalized the labeling industry." },
      { sym: "SyD", num: 47, name: "Synthetic Data", cat: "DA", row: 3, col: 6, desc: "Synthetic data is generated by AI models to supplement training datasets or circumvent privacy issues. LLMs can generate training examples for text classification, diffusion models can create synthetic images for computer vision. Microsoft's Phi models were partly trained on GPT-4-generated synthetic data — a controversial but effective approach. Synthetic data enables training for rare scenarios (accidents, diseases) that are underrepresented in real data." },
      { sym: "PrP", num: 48, name: "Preprocessing", cat: "DA", row: 3, col: 7, desc: "Preprocessing encompasses all data cleaning and transformation steps before actual training. For text: deduplication, quality filtering, language detection, removal of boilerplate and toxic content. For images: resizing, normalization, alignment. Preprocessing quality determines the upper bound of model quality — 'Garbage In, Garbage Out' applies especially to AI. Tools like Common Crawl Pipeline and RedPajama have set standards for large-scale text preprocessing." },
      { sym: "GrR", num: 49, name: "GraphRAG", cat: "DA", row: 3, col: 14, desc: "GraphRAG extends classic RAG with knowledge graphs that explicitly model relationships between entities. Instead of retrieving isolated text chunks, GraphRAG navigates connected concepts — 'Who works where?', 'Which products are related?'. Microsoft Research released GraphRAG as an open-source framework that automatically extracts knowledge graphs from documents. GraphRAG shows clear advantages especially for multi-hop questions ('Which companies in X's supply chain are affected by Y?')." },
      { sym: "ChS", num: 50, name: "Chunking", cat: "DA", row: 3, col: 15, desc: "Chunking strategies determine how documents are split into sections for RAG — a critical design decision. Fixed-size chunking cuts by character count, semantic chunking at thematic boundaries, recursive chunking hierarchically by headings and paragraphs. Agentic chunking uses LLMs to find optimal split points. Chunks too small lose context, too large flood the context window — finding the right balance is crucial for RAG quality." },
      { sym: "OCR", num: 51, name: "OCR", cat: "DA", row: 3, col: 16, desc: "Optical Character Recognition extracts machine-readable text from images, scanned documents, and PDFs. Modern OCR systems are based on deep learning (Tesseract 5, PaddleOCR, EasyOCR) and achieve near-perfect accuracy on printed text. Multimodal LLMs like GPT-4V and Claude can perform OCR implicitly while also understanding layout and context. OCR is indispensable for digitizing archives, invoice processing, and accessible documents." },
      { sym: "WCr", num: 52, name: "Web Crawling", cat: "DA", row: 3, col: 17, desc: "Web Crawling systematically collects data from the internet for ML training, RAG knowledge bases, and search indexes. Common Crawl provides petabytes of crawled web data monthly — the basis of nearly all LLM training corpora. Crawling pipelines must respect robots.txt, filter duplicates, assess quality, and consider copyright. Specialized crawlers like Scrapy, Firecrawl, and Apify extract structured data from web pages for RAG applications." },
      { sym: "PyT", num: 53, name: "PyTorch", cat: "TF", row: 4, col: 0, desc: "PyTorch is Meta's deep learning framework and the undisputed standard in AI research. Dynamic computation graphs enable flexible, Python-like programming — debugging with print statements instead of rigid graph definitions. Over 80% of all ML papers at conferences use PyTorch. With PyTorch 2.0, torch.compile was introduced, closing performance gaps with TensorFlow for production deployment." },
      { sym: "TnF", num: 54, name: "TensorFlow", cat: "TF", row: 4, col: 1, desc: "TensorFlow is Google's ML framework with a strong focus on production deployment and scaling. TensorFlow Lite enables ML on mobile and edge devices, TensorFlow.js runs ML in the browser, TensorFlow Serving provides scalable inference. The Keras API simplifies high-level model design. Although PyTorch dominates in research, TensorFlow remains the first choice in many production environments and Google-centric stacks." },
      { sym: "HgF", num: 55, name: "Hugging Face", cat: "TF", row: 4, col: 2, desc: "Hugging Face has become the GitHub of the AI world — an open-source ecosystem with over 500,000 models. The Transformers library provides unified APIs for thousands of pre-trained models; the Model Hub enables easy sharing and downloading. Datasets, Spaces (demo apps), AutoTrain, and Inference Endpoints complete the platform. Hugging Face democratizes ML access and is often the first stop for developers wanting to work with AI." },
      { sym: "LCh", num: 56, name: "LangChain", cat: "TF", row: 4, col: 3, desc: "LangChain is the most popular framework for building LLM-based applications and agents. It provides abstractions for Chains (sequential LLM calls), Agents (autonomous tool use), Memory (conversation memory), and RAG pipelines. LangChain supports all major LLM providers and integrates hundreds of tools and data sources. Critics note over-abstraction and frequent breaking changes, yet it has significantly accelerated LLM application development." },
      { sym: "LId", num: 57, name: "LlamaIndex", cat: "TF", row: 4, col: 4, desc: "LlamaIndex (formerly GPT Index) is a data framework that simplifies LLM access to external data sources. It specializes in indexing, retrieval, and query processing across diverse data formats — PDFs, databases, APIs, Notion, Slack. The Data Agent architecture enables complex queries across multiple data sources. LlamaIndex is particularly strong for structured RAG pipelines with many heterogeneous sources." },
      { sym: "vLM", num: 58, name: "vLLM", cat: "TF", row: 4, col: 5, desc: "vLLM is a high-performance inference engine for LLMs that manages the KV-Cache like virtual memory using PagedAttention. Through efficient memory management, vLLM can serve 2-4x more concurrent requests than naive implementations. Continuous batching dynamically combines incoming requests to maximize GPU utilization. vLLM is the de facto standard for self-hosted LLM serving and is used in production by many AI startups." },
      { sym: "Olm", num: 59, name: "Ollama", cat: "TF", row: 4, col: 6, desc: "Ollama makes local LLM usage as easy as Docker containers: 'ollama run llama3' starts a model in seconds. It automatically manages model downloads, quantization, and a local API — ideal for privacy, offline use, and experimentation. Ollama supports all common open-source models (LLaMA, Mistral, Gemma, Phi) in various quantization levels. An OpenAI-compatible API enables seamless integration into existing applications." },
      { sym: "MCP", num: 60, name: "Model Context Protocol", cat: "TF", row: 4, col: 7, desc: "Model Context Protocol (MCP) is Anthropic's open standard for integrating external tools and data sources into LLM systems. Like USB-C for hardware, MCP creates a unified interface: every MCP server (GitHub, Slack, database) speaks the same protocol. This enables LLMs to use tools without writing custom code for each integration. MCP is increasingly becoming an industry standard, supported by Cursor, Replit, and many other platforms." },
      { sym: "MLf", num: 61, name: "MLflow", cat: "TF", row: 4, col: 10, desc: "MLflow is an open-source platform for ML lifecycle management from Databricks. It manages experiment tracking (metrics, parameters, artifacts), model registry (versioning, staging), and deployment (Docker, cloud). Teams can train reproducibly, compare models, and seamlessly transition from experiment to production. MLflow has established itself as the standard tool in enterprise ML teams and integrates with all major cloud providers." },
      { sym: "WnB", num: 62, name: "Weights & Biases", cat: "TF", row: 4, col: 11, desc: "Weights & Biases (W&B) provides best-in-class experiment tracking with interactive dashboards and real-time visualization. Teams track hyperparameters, metrics, GPU usage, and model performance across hundreds of parallel runs. Sweep functionality automates hyperparameter optimization; Artifacts manage dataset versions. W&B has become the standard tool for ML research teams — nearly every AI paper features W&B plots." },
      { sym: "JAX", num: 63, name: "JAX", cat: "TF", row: 4, col: 12, desc: "JAX combines NumPy-like syntax with autograd (automatic differentiation) and XLA compiler for maximum performance. Google Research and DeepMind use JAX extensively — Gemini was trained with it. Functional programming enables easy parallelization across TPU pods with pmap and vmap. JAX is particularly suited for research on new architectures where flexibility and speed are needed simultaneously." },
      { sym: "CrA", num: 64, name: "CrewAI", cat: "TF", row: 4, col: 13, desc: "CrewAI is a Python framework for orchestrating multi-agent systems with clear role assignments. Agents are given defined roles (Researcher, Writer, Critic), tools, and tasks, working collaboratively together. The architecture supports sequential, parallel, and hierarchical workflows between agents. CrewAI simplifies getting started with multi-agent systems and is particularly popular for content creation, research, and data analysis." },
      { sym: "DSp", num: 65, name: "DSPy", cat: "TF", row: 4, col: 14, desc: "DSPy from Stanford is a programming framework that systematically optimizes LLM prompts and pipelines. Instead of writing prompts manually, you define signatures (Input→Output) in DSPy and let the optimizer find the best prompts. Teleprompter modules automatically optimize few-shot examples, chain-of-thought steps, and prompt formulations. DSPy treats prompting as an optimization problem — more scientific and reproducible than manual prompt engineering." },
      { sym: "A2A", num: 66, name: "A2A Protocol", cat: "TF", row: 4, col: 15, desc: "Agent-to-Agent Protocol (A2A) is Google's open standard enabling AI agents to communicate with each other and delegate tasks. While MCP standardizes the connection between agent and tool, A2A addresses agent-to-agent communication. A2A defines Agent Cards (capability descriptions), task management, and secure communication patterns. Combined with MCP, it creates a complete interoperability ecosystem for AI agents." },
      { sym: "SmK", num: 67, name: "Semantic Kernel", cat: "TF", row: 4, col: 16, desc: "Semantic Kernel is Microsoft's open-source framework for orchestrating AI functions in enterprise applications. It connects LLMs with plugins (functions), memory (embeddings/vector storage), and a planner for automatic task decomposition. Semantic Kernel is particularly well integrated in the Microsoft ecosystem (Azure, Office 365, Dynamics). The architecture follows the 'AI orchestration layer' principle — middleware between LLM and business logic." },
      { sym: "OAI", num: 68, name: "OpenAI API", cat: "TF", row: 4, col: 17, desc: "The OpenAI API is the most widely used LLM API globally, providing access to GPT-4, DALL-E, Whisper, and embeddings. The Chat Completions API has become the de facto standard — many other providers offer OpenAI-compatible endpoints. The Assistants API enables agentic applications with Code Interpreter, File Search, and Function Calling. API pricing has become a benchmark for the entire industry, continuously declining." },
      { sym: "NLG", num: 69, name: "Text Generation", cat: "AP", row: 5, col: 0, desc: "Text Generation encompasses all AI systems that automatically produce human-like text — from articles to code to creative writing. LLMs generate token by token autoregressively, with each new token based on all previous ones. Techniques like temperature, top-p sampling, and frequency penalty control creativity and coherence. Text generation has reached virtually every industry: marketing, journalism, customer service, software development." },
      { sym: "ImG", num: 70, name: "Image Generation", cat: "AP", row: 5, col: 1, desc: "AI image generation has evolved from a research curiosity to a mass phenomenon since 2022. DALL-E 3, Midjourney, Stable Diffusion, and Flux create photorealistic images or artistic illustrations from text descriptions. The technology is based on diffusion models and is used for advertising, product design, concept art, and content creation. Ethical debates about copyright, deepfakes, and artist displacement accompany this revolution." },
      { sym: "TTS", num: 71, name: "Text-to-Speech", cat: "AP", row: 5, col: 2, desc: "Text-to-Speech systems convert written text into naturally sounding speech — now nearly indistinguishable from human voices. ElevenLabs enables voice cloning with just seconds of audio, OpenAI TTS offers multiple realistic voices. Bark and Coqui are open-source alternatives with good quality. TTS is used for audiobooks, podcasts, accessibility, voice assistants, and content localization into dozens of languages." },
      { sym: "STT", num: 72, name: "Speech-to-Text", cat: "AP", row: 5, col: 3, desc: "Speech-to-Text (ASR — Automatic Speech Recognition) transcribes spoken language into text. OpenAI's Whisper set new standards in 2022: multilingual, robust against background noise, and freely available as open source. Modern ASR systems use transformer architectures and achieve near-human accuracy on clear speech. Applications range from meeting transcription to subtitle generation to voice interfaces and accessibility tools." },
      { sym: "CpV", num: 73, name: "Computer Vision", cat: "AP", row: 5, col: 4, desc: "Computer Vision encompasses all AI systems that understand and process visual information — image recognition, object detection, segmentation, pose estimation. Vision Transformer (ViT) and YOLO are current standard architectures. Multimodal LLMs (GPT-4V, Claude Vision) have dissolved the boundaries between CV and NLP — they 'see' and 'understand' images simultaneously. Use cases: quality control, medical imaging, autonomous driving, augmented reality." },
      { sym: "VdG", num: 74, name: "Video Generation", cat: "AP", row: 5, col: 5, desc: "AI video generation is the latest frontier of generative AI — creating coherent videos from text descriptions. Sora (OpenAI), Runway Gen-3, Kling, and Pika produce increasingly realistic clips from seconds to minutes. The technology uses video diffusion models and still struggles with physical consistency and temporal coherence. Use cases are emerging in advertising, film previsualization, social media content, and prototyping." },
      { sym: "CdG", num: 75, name: "Code Generation", cat: "AP", row: 5, col: 6, desc: "AI-powered code generation has fundamentally changed software development. GitHub Copilot, Cursor, Claude Code, and Codex generate code from natural language descriptions and context. Studies show productivity increases of 30-55% for developers. The debate about code quality, security vulnerabilities, and the future of the developer profession is in full swing — what's clear: every developer will work with AI tools in the future." },
      { sym: "RoB", num: 76, name: "Robotics", cat: "AP", row: 5, col: 7, desc: "AI-powered robotics connects Foundation Models with physical interaction in the real world (Embodied AI). Manipulation (grasping, assembly), navigation (autonomous locomotion), and multi-robot coordination are core challenges. Google's RT-2 and Figure 01 use vision-language models for robot control from natural language. The next wave of humanoid robots (Tesla Optimus, Figure, 1X) aims to use Foundation Models for general physical tasks." },
      { sym: "ViC", num: 77, name: "Vibe Coding", cat: "AP", row: 5, col: 10, desc: "Vibe Coding describes the paradigm shift: software development through natural language description instead of manual programming. You describe to an AI tool (Cursor, Replit Agent, Claude Code, v0) what the app should do — the AI writes all the code. This approach democratizes software development for non-programmers and enormously accelerates prototyping. Result quality depends heavily on prompt quality and the framework used." },
      { sym: "DrA", num: 78, name: "Drug Discovery", cat: "AP", row: 5, col: 11, desc: "AI is revolutionizing drug development: from target identification to molecular design to clinical trials. AlphaFold solved the 50-year-old protein folding problem in 2020 and received the Nobel Prize in Chemistry in 2024. Generative models design new molecules with desired properties; ML models predict toxicity and efficacy. AI could potentially compress the typical 10-15 year drug development cycle to 2-3 years." },
      { sym: "AvD", num: 79, name: "Autonomous Driving", cat: "AP", row: 5, col: 12, desc: "Autonomous driving combines computer vision, sensor fusion (camera, lidar, radar), path planning, and control systems. Tesla pursues a camera-based end-to-end approach with neural networks; Waymo uses lidar-based modular systems. Level 4 autonomy (driverless taxi) is already reality in limited areas (Waymo in Phoenix/SF). Full Level 5 autonomy (everywhere, all conditions) remains one of the greatest open AI challenges." },
      { sym: "ReS", num: 80, name: "Recommender Systems", cat: "AP", row: 5, col: 13, desc: "Recommender systems are one of the oldest and most economically significant AI applications. Collaborative filtering recommends based on similar users, content-based on item properties, hybrid combines both. Netflix, Spotify, Amazon, and TikTok generate billions in revenue through personalized recommendations. Modern recommenders use deep learning, transformer architectures, and increasingly LLMs for conversational recommendations." },
      { sym: "SeA", num: 81, name: "Sentiment Analysis", cat: "AP", row: 5, col: 14, desc: "Sentiment Analysis automatically detects emotional tone in texts — positive, negative, neutral, or more granular. Applications range from brand monitoring (What are customers saying on social media?) to financial analysis (market sentiment from news) to customer service triage. Pre-trained transformer models achieve >90% accuracy on standard sentiment tasks. Challenges lie in sarcasm, irony, cultural context, and aspect-based sentiment." },
      { sym: "3DG", num: 82, name: "3D Generation", cat: "AP", row: 5, col: 15, desc: "3D generation from text or single images is one of the hottest research areas in generative AI. NeRF (Neural Radiance Fields) learns 3D scenes from 2D photos; Gaussian Splatting offers a faster rendering alternative. Tools like Meshy, Tripo, and Luma generate 3D assets for games, AR/VR, and product visualization. Quality is approaching production-ready levels, potentially radically democratizing 3D content creation." },
      { sym: "MuG", num: 83, name: "Music Generation", cat: "AP", row: 5, col: 16, desc: "AI music generation creates complete songs including vocals, instrumentation, and mastering from text descriptions. Suno and Udio can produce professional-sounding tracks in any genre within minutes. The technology uses transformer and diffusion models trained on millions of songs. The music and copyright debate is intense — artists and labels are grappling with the disruption of their business models." },
      { sym: "SrC", num: 84, name: "AI Search", cat: "AP", row: 5, col: 17, desc: "AI-powered search is increasingly replacing traditional keyword search with conversation-based answer generation. Perplexity delivers source-based answers instead of links, Google AI Overview summarizes search results, Bing Chat integrates GPT into search. This paradigm shift threatens the classic search engine business model (clicks on links → advertising). For users it means faster, more direct answers — for content creators, less organic traffic." },
      { sym: "AlI", num: 85, name: "Alignment", cat: "ES", row: 6, col: 0, desc: "AI Alignment is the fundamental problem of developing AI systems whose goals align with human values and intentions. Constitutional AI (Anthropic), RLHF (OpenAI), and DPO are current alignment techniques. The problem becomes existential as models grow more powerful: a superintelligent, unaligned system would pose an enormous risk. Alignment research addresses reward hacking, goal misgeneralization, and scalable oversight." },
      { sym: "XAI", num: 86, name: "Explainability", cat: "ES", row: 6, col: 1, desc: "Explainable AI (XAI) makes AI decisions comprehensible and verifiable for humans. SHAP values show which features influenced a decision, LIME explains local predictions, attention maps visualize what a model focuses on. XAI is increasingly required by regulation (EU AI Act) and ethically mandated, especially for credit scoring, medical diagnostics, and justice. The challenge: deep learning models are inherently hard to explain — interpretability and performance often stand in tension." },
      { sym: "BiF", num: 87, name: "Bias & Fairness", cat: "ES", row: 6, col: 2, desc: "Bias in AI systems reproduces and amplifies societal prejudices from training data. Language models can replicate gender stereotypes, facial recognition performs worse on darker skin tones, hiring filters disadvantage certain groups. Fairness metrics (Demographic Parity, Equalized Odds) and audit frameworks help measure and reduce bias. Complete bias elimination is impossible — the question is which tradeoffs are socially acceptable." },
      { sym: "PrI", num: 88, name: "Privacy", cat: "ES", row: 6, col: 3, desc: "Privacy in AI encompasses protecting personal data in training, inference, and deployment. Differential Privacy adds mathematically controlled noise to make individual data points unrecoverable. Membership Inference Attacks can test whether specific data was used in training — a risk for sensitive data. GDPR, CCPA, and the EU AI Act impose strict requirements on AI systems processing personal data." },
      { sym: "RdT", num: 89, name: "Red Teaming", cat: "ES", row: 6, col: 4, desc: "Red Teaming refers to the systematic, adversarial testing of AI systems for vulnerabilities and misuse potential. Specialized teams attempt to trigger jailbreaks, perform prompt injection, provoke toxic outputs, or circumvent safety filters. Anthropic, OpenAI, and Google conduct extensive red-teaming campaigns before every release. External bug bounty programs and academic red-teaming competitions complement internal efforts." },
      { sym: "GuR", num: 90, name: "Guardrails", cat: "ES", row: 6, col: 5, desc: "Guardrails are safety layers placed between user input and model output. Input guardrails filter dangerous prompts (prompt injection, toxic requests); output guardrails validate responses (fact-checking, toxicity, PII detection). Frameworks like NeMo Guardrails (NVIDIA), Guardrails AI, and LlamaGuard provide configurable safety layers. Guardrails are essential for enterprise deployment, where uncontrolled model outputs carry liability risks." },
      { sym: "HaL", num: 91, name: "Hallucinations", cat: "ES", row: 6, col: 6, desc: "Hallucinations are a core problem of LLMs: the model generates plausible-sounding but factually incorrect information. The root cause lies in the statistical nature of text generation — the model maximizes probability, not truth. Countermeasures include RAG (incorporating external knowledge), Chain-of-Verification (self-checking), grounding (source citations), and specialized training data. Completely eliminating hallucinations remains an open challenge." },
      { sym: "EuA", num: 92, name: "EU AI Act", cat: "ES", row: 6, col: 7, desc: "The EU AI Act is the world's first comprehensive AI law, taking effect in stages from 2024. It categorizes AI systems into risk classes: Minimal (spam filters), Limited (chatbots), High (credit scoring, medicine), and Unacceptable (social scoring). High-risk systems must meet strict requirements for transparency, data quality, human oversight, and risk management. The Act influences AI development worldwide — similar to how GDPR became the global data protection standard." },
      { sym: "AgW", num: 93, name: "Agentic Workflows", cat: "AG", row: 6, col: 10, desc: "Agentic Workflows describe AI systems that autonomously plan, act, observe, and adapt their approach. Instead of one-shot prompt→response interactions, agents run iterative loops: analyze task, create plan, use tools, check results, improve. Frameworks like LangGraph, CrewAI, and AutoGen orchestrate such workflows. 2024/2025 marks the transition from chatbots to real AI agents that independently handle complex tasks over hours." },
      { sym: "ToU", num: 94, name: "Tool Use", cat: "AG", row: 6, col: 11, desc: "Tool Use enables LLMs to interact with the outside world beyond text generation. Models can call APIs, execute code, query databases, read web pages, and edit files. Function Calling (OpenAI), Tool Use (Anthropic), and MCP standardize tool integration. Tool Use is the foundation for AI agents — without tools, an LLM remains limited to its training knowledge." },
      { sym: "MAS", num: 95, name: "Multi-Agent Systems", cat: "AG", row: 6, col: 12, desc: "Multi-Agent Systems coordinate multiple specialized AI agents that collaboratively solve complex tasks. A researcher agent gathers information, a writer formulates text, a critic reviews quality — each agent has its own capabilities and tools. Challenges lie in communication, task allocation, conflict resolution, and error handling between agents. Multi-agent architectures scale better than monolithic agents for complex, multi-step tasks." },
      { sym: "PrE", num: 96, name: "Prompt Engineering", cat: "AG", row: 6, col: 13, desc: "Prompt Engineering is the art and science of formulating optimal instructions for LLMs. System prompts define behavior and persona, few-shot examples show desired patterns, chain-of-thought activates reasoning. Techniques like role prompting, step-back prompting, and structured output prompting can dramatically improve response quality. Prompt engineering is increasingly complemented by automated methods (DSPy) but remains valuable as a human skill." },
      { sym: "MeM", num: 97, name: "Memory Systems", cat: "AG", row: 6, col: 14, desc: "Memory Systems give AI agents the ability to remember past interactions and insights. Short-term memory uses the context window; long-term memory stores summaries in vector databases or key-value stores. MemGPT manages memory hierarchically, analogous to OS memory management (RAM vs. disk). Effective memory systems are critical for personalized assistants and agents working on projects over weeks." },
      { sym: "PlN", num: 98, name: "Planning & Reasoning", cat: "AG", row: 6, col: 15, desc: "Planning & Reasoning enables AI agents to decompose complex tasks into subtasks and proceed strategically. ReAct (Reason + Act) alternates between thinking and acting; Tree-of-Thought explores multiple solution paths in parallel. Task decomposition breaks large goals into manageable sub-tasks. LLM reasoning capabilities (especially o1/o3 and Claude) have improved dramatically in 2024/2025, enabling increasingly autonomous problem-solving." },
      { sym: "CdI", num: 99, name: "Code Interpreter", cat: "AG", row: 6, col: 16, desc: "Code Interpreter enables LLMs to execute Python code in an isolated sandbox and analyze results. Data analysis, mathematical calculations, chart creation, and file transformations become precise rather than approximate through code execution. OpenAI's Code Interpreter, Claude's Computer Use, and Google's Code Execution offer this capability. The sandbox environment ensures executed code has no access to sensitive systems." },
      { sym: "OcH", num: 100, name: "Orchestration", cat: "AG", row: 6, col: 17, desc: "Orchestration coordinates the interplay of multiple AI components — LLMs, tools, data sources, and agents — in complex workflows. DAGs (Directed Acyclic Graphs) define dependencies, retry logic, and parallelization. LangGraph, Prefect, Temporal, and Apache Airflow are common orchestration tools. In enterprise scenarios, the orchestration layer connects dozens of microservices, APIs, and ML models into robust end-to-end pipelines." },
      { sym: "GPU", num: 101, name: "GPU Computing", cat: "IN", row: 7, col: 0, desc: "GPUs (Graphics Processing Units) are the workhorses of AI training — their massively parallel architecture is ideal for matrix multiplication. NVIDIA dominates the AI GPU market with H100, H200, and B200 at an estimated 80-90% market share. A single GPT-4 training reportedly consumes 25,000+ A100 GPUs over months — costs in the hundreds of millions. GPU scarcity and energy consumption are central bottlenecks of AI development." },
      { sym: "TPU", num: 102, name: "TPU", cat: "IN", row: 7, col: 1, desc: "Tensor Processing Units are Google's custom-designed AI chips optimized for TensorFlow and JAX workloads. TPU pods connect thousands of chips via high-speed networks for distributed training. Google uses TPUs internally for training Gemini, PaLM, and other models. TPU v5p achieves 459 TFLOPS at BF16 — comparable to NVIDIA H100, but only available through Google Cloud." },
      { sym: "ClC", num: 103, name: "Cloud ML", cat: "IN", row: 7, col: 2, desc: "Cloud ML Services provide ML infrastructure, tools, and APIs as managed services. AWS SageMaker, Azure ML, and GCP Vertex AI cover the entire ML lifecycle: training, hosting, monitoring. For LLMs, all three clouds offer API access to Foundation Models (Bedrock, Azure OpenAI, Model Garden). Cloud ML democratizes AI access — teams without their own GPU clusters can still train and deploy state-of-the-art models." },
      { sym: "EdG", num: 104, name: "Edge AI", cat: "IN", row: 7, col: 3, desc: "Edge AI brings AI inference directly to end devices — smartphones, IoT sensors, cameras, cars — without cloud connectivity. TensorFlow Lite, ONNX Runtime, Core ML, and OpenVINO optimize models for resource-constrained hardware. Apple's Neural Engine, Google's Edge TPU, and Qualcomm's Hexagon are specialized AI chips for mobile devices. Edge AI offers low latency, privacy (data never leaves the device), and offline capability." },
      { sym: "CoN", num: 105, name: "Containerization", cat: "IN", row: 7, col: 4, desc: "Containerization with Docker and Kubernetes has revolutionized the reproducibility and scalability of ML workflows. Docker containers encapsulate models with all dependencies; Kubernetes orchestrates GPU clusters for training and serving. NVIDIA Container Toolkit integrates GPU access into containers; MLflow and Kubeflow provide ML-specific Kubernetes extensions. In production environments, containerized ML pipelines are the standard for reliable deployment." },
      { sym: "ScL", num: 106, name: "Scaling Laws", cat: "IN", row: 7, col: 5, desc: "Scaling Laws describe the mathematical relationships between model size, data volume, compute, and model performance. Kaplan et al. (OpenAI, 2020) showed power-law relationships; Chinchilla (DeepMind, 2022) proved many models were too large and undertrained. The laws state: double the compute → keep the compute-to-data ratio optimal → predictable performance improvement. Scaling Laws are the theoretical foundation for AI labs' investment decisions." },
      { sym: "MoS", num: 107, name: "Model Serving", cat: "IN", row: 7, col: 6, desc: "Model Serving refers to deploying trained models for real-time inference in production environments. NVIDIA Triton Inference Server, Hugging Face TGI (Text Generation Inference), and vLLM are leading serving frameworks. Continuous batching, speculative decoding, and tensor parallelism maximize throughput at minimum latency. Autoscaling, health monitoring, and A/B testing are essential for reliable production serving." },
      { sym: "CUd", num: 108, name: "CUDA", cat: "IN", row: 7, col: 7, desc: "CUDA is NVIDIA's parallel programming model and the fundamental software layer on which virtually all modern ML is built. Through CUDA, frameworks like PyTorch and TensorFlow communicate with NVIDIA GPUs; cuBLAS, cuDNN, and NCCL are optimized libraries for ML operations. NVIDIA's CUDA ecosystem is the deepest moat in the AI hardware market — a reason why competitors (AMD, Intel) gain market share only slowly despite good hardware. ROCm (AMD) and oneAPI (Intel) are attempting to establish themselves as alternatives." },
      { sym: "NER", num: 109, name: "Named Entity Rec.", cat: "NL", row: 7, col: 10, desc: "Named Entity Recognition identifies and classifies named entities in text: persons, locations, organizations, dates, monetary amounts. Modern NER uses transformer-based models (BERT, RoBERTa) and achieves F1 scores above 90% for standard domains. NER is a building block for information extraction, knowledge graph construction, and document processing. Specialized NER models for medicine (BioNER), law, and finance address domain-specific entity types." },
      { sym: "SuM", num: 110, name: "Summarization", cat: "NL", row: 7, col: 11, desc: "Automatic summarization compresses long texts to their essential information. Extractive summarization selects the most important sentences; abstractive summarization formulates new, shorter summaries. LLMs have revolutionized the quality of abstractive summarization — they capture context and rephrase naturally. Applications: news summaries, meeting minutes, research paper abstracts, document reviews." },
      { sym: "TrN", num: 111, name: "Translation", cat: "NL", row: 7, col: 12, desc: "Machine translation has reached quality levels through transformer models that replace human translators for many text types. Neural Machine Translation (NMT) models learn end-to-end from parallel text corpora. LLMs enable zero-shot translation into languages with little training data. Google Translate, DeepL, and Meta's NLLB (No Language Left Behind) translate between hundreds of language pairs with increasingly professional quality." },
      { sym: "QnA", num: 112, name: "Question Answering", cat: "NL", row: 7, col: 13, desc: "Question Answering systems automatically answer natural language questions from structured or unstructured data sources. Open-domain QA answers arbitrary factual questions; closed-book QA from model knowledge; open-book QA with access to documents (RAG). Extractive QA marks the answer in the source text; generative QA formulates it freely. LLMs have democratized QA — every chatbot is fundamentally a QA system." },
      { sym: "ClS", num: 113, name: "Classification", cat: "NL", row: 7, col: 14, desc: "Text Classification automatically assigns texts to predefined categories — one of the most fundamental NLP tasks. Spam detection, topic assignment, intent recognition in chatbots, toxicity detection, and content moderation are typical applications. BERT-based models and fine-tuned LLMs achieve >95% accuracy on many benchmark tasks. Zero-shot classification with LLMs enables categorization without any training examples." },
      { sym: "ToM", num: 114, name: "Topic Modeling", cat: "NL", row: 7, col: 15, desc: "Topic Modeling automatically extracts thematic structures from large text collections. Classic methods like LDA (Latent Dirichlet Allocation) have been revolutionized by BERTopic, which combines sentence embeddings with clustering. Results show which topics exist in a corpus, how they change over time, and which documents belong together. Applications: market research, social media monitoring, literature analysis, content strategy." },
      { sym: "InE", num: 115, name: "Info Extraction", cat: "NL", row: 7, col: 16, desc: "Information Extraction extracts structured data from unstructured text — facts, relations, events, and attributes. Relation extraction identifies connections ('Company X acquired Company Y'); event extraction identifies events with actors and timestamps. LLMs can function as universal extractors that pull arbitrary information structures from texts using prompt instructions. IE is fundamental for knowledge graph construction, document processing, and business intelligence." },
      { sym: "DlG", num: 116, name: "Dialogue Systems", cat: "NL", row: 7, col: 17, desc: "Dialogue Systems encompass all AI systems for natural language conversation. Task-oriented systems solve specific tasks (book a hotel, find a flight); open-domain chatbots conduct free conversations. LLMs have unified both categories — one model can do both. Challenges lie in coherence over long conversations, personalization, detecting conversation breakdowns, and emotional intelligence." },
      { sym: "SD", num: 117, name: "Stable Diffusion", cat: "FM", row: 9, col: 3, desc: "Stable Diffusion is the most important open-source image generation model and the basis of a massive community ecosystem. Stability AI released it as open source in 2022, triggering an explosion of fine-tunes, ControlNet, LoRAs, and custom workflows. SDXL and SD3 significantly improved quality and text rendering. ComfyUI and Automatic1111 are popular interfaces enabling complex generative pipelines without code." },
      { sym: "MdJ", num: 118, name: "Midjourney", cat: "FM", row: 9, col: 4, desc: "Midjourney produces the most aesthetically impressive AI-generated images and has developed its own artistic identity. The tool runs via Discord bots and more recently through its own web app. Midjourney's strength lies in the artistic interpretation of prompts — results often look like professional illustrations or concept art. Particularly popular with designers, concept artists, and creatives who want to quickly explore visual ideas." },
      { sym: "DaE", num: 119, name: "DALL·E", cat: "FM", row: 9, col: 5, desc: "DALL-E is OpenAI's image generator that first brought the world's attention to text-to-image generation in 2021. DALL-E 3 is deeply integrated into ChatGPT, generating images directly from conversation with remarkable text fidelity. Its strength lies in precise execution of complex prompts and seamless integration into the OpenAI workflow. Inpainting and outpainting enable targeted editing of specific image regions." },
      { sym: "Sor", num: 120, name: "Sora", cat: "FM", row: 9, col: 6, desc: "Sora is OpenAI's video generation model that caused a sensation in 2024 with impressively physically coherent demo videos. It understands 3D consistency, object permanence, and physical interactions at a previously unmatched level. Sora uses a diffusion transformer architecture that processes videos as sequences of patches. The release marks the beginning of a new era for content creation, film, and advertising." },
      { sym: "Whi", num: 121, name: "Whisper", cat: "FM", row: 9, col: 7, desc: "Whisper is OpenAI's open-source speech recognition model that understands and transcribes over 100 languages. Trained on 680,000 hours of multilingual audio data, Whisper achieves remarkable robustness against accents, background noise, and technical language. Its open-source availability has made it the standard for transcription, subtitles, and voice interfaces. Whisper large-v3 achieves near-human transcription quality for many languages." },
      { sym: "AlF", num: 122, name: "AlphaFold", cat: "FM", row: 9, col: 8, desc: "AlphaFold from DeepMind solved one of biology's greatest open problems in 2020: predicting the 3D structure of proteins from their amino acid sequence. AlphaFold2 achieved experimental accuracy and predicted the structure of over 200 million proteins — virtually all known proteins. Demis Hassabis and John Jumper received the 2024 Nobel Prize in Chemistry for this work. AlphaFold3 extends prediction to protein-DNA, protein-RNA, and protein-ligand interactions." },
      { sym: "BRT", num: 123, name: "BERT", cat: "FM", row: 9, col: 9, desc: "BERT (Bidirectional Encoder Representations from Transformers) was Google's breakthrough for Natural Language Understanding in 2018. Unlike GPT (forward-only), BERT learns bidirectionally — understanding context from both sides of a word simultaneously. Masked Language Modeling (masking random words and predicting them) and Next Sentence Prediction are the training objectives. BERT revolutionized NLP benchmarks and remains the basis of many production systems for classification, NER, and search." },
      { sym: "CLp", num: 124, name: "CLIP", cat: "FM", row: 9, col: 10, desc: "CLIP (Contrastive Language-Image Pre-training) from OpenAI connects image and text understanding in a shared embedding space. Trained on 400 million image-text pairs from the internet, CLIP can classify images into arbitrary categories without ever being trained on them. CLIP is a key building block for diffusion-based image generation (Stable Diffusion, DALL-E) and multimodal search. The architecture inspired an entire generation of multimodal models." },
      { sym: "DpS", num: 125, name: "DeepSeek", cat: "FM", row: 9, col: 11, desc: "DeepSeek from China has surprised the AI world in 2024/2025: despite US chip sanctions, their models reach Western top-tier levels at significantly less training compute. DeepSeek-V3 uses innovative Mixture-of-Experts architecture and was trained at a fraction of the cost of comparable models. The open-source release sparked discussion about the effectiveness of export controls and the innovation capacity of Chinese AI labs. DeepSeek-R1 also demonstrates strong reasoning capabilities." },
      { sym: "Phi", num: 126, name: "Phi", cat: "FM", row: 9, col: 12, desc: "Phi is Microsoft's family of small but surprisingly powerful language models (Small Language Models / SLMs). Phi-3 with 3.8B parameters achieves results that challenge much larger models — through careful data selection and synthetic training. The models are optimized for edge deployment: smartphones, laptops, IoT devices. Microsoft's thesis: data quality can partly compensate for model size — fewer parameters, better curated data." },
      { sym: "Flx", num: 127, name: "Flux", cat: "FM", row: 9, col: 13, desc: "Flux from Black Forest Labs (founded by ex-Stability AI researchers) is a fast, high-quality open-source image generator. Flux.1 Pro, Dev, and Schnell address different quality/speed tradeoffs. Image quality competes with Midjourney and DALL-E 3, with full open-source availability. Flux has established itself as a popular Stable Diffusion alternative for local and API-based image generation." },
      { sym: "Qwn", num: 128, name: "Qwen", cat: "FM", row: 9, col: 14, desc: "Qwen is Alibaba Cloud's multimodal, multilingual open-source LLM family with a remarkably broad capability range. Qwen2.5 offers models from 0.5B to 72B parameters, plus specialized variants for code (Qwen-Coder), math, and vision. Particularly strong in Chinese and English, with good support for other languages. Qwen demonstrates that the Chinese AI ecosystem produces full-fledged alternatives to Western Foundation Models." },
    ];

    const TOTAL_COLS = 18;
    const catEntries = Object.entries(CATEGORIES);

    /* ═══════════════════════ CELL ═══════════════════════ */

    function Cell({ el, selected, setSelected, hoveredCat }) {
      const cat = CATEGORIES[el.cat];
      const isSelected = selected?.num === el.num;
      const dimmed = hoveredCat && hoveredCat !== el.cat;
      const [hovered, setHovered] = useState(false);
      const active = isSelected || (hovered && !dimmed);

      return (
        <div
          onClick={() => setSelected(isSelected ? null : el)}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          role="button"
          tabIndex={0}
          aria-label={`${el.sym} – ${el.name}`}
          onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setSelected(isSelected ? null : el); }}}
          style={{
            aspectRatio: "1",
            background: active ? cat.light : "#fff",
            border: `1.5px solid ${active ? cat.color : "#e8e8e3"}`,
            borderLeft: `3px solid ${active ? cat.color : dimmed ? "#e8e8e3" : cat.color + "50"}`,
            borderRadius: 4,
            display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            cursor: "pointer",
            transition: "all 0.2s ease",
            opacity: dimmed ? 0.1 : 1,
            position: "relative",
            padding: 2,
            transform: active ? "scale(1.1)" : "scale(1)",
            zIndex: active ? 10 : 1,
            boxShadow: active ? `0 3px 16px ${cat.color}20` : "0 1px 2px rgba(0,0,0,0.03)",
            outline: "none",
          }}
        >
          <span style={{
            position: "absolute", top: 2, right: 3,
            fontSize: "clamp(4px, 0.6vw, 7px)", color: "#ccc",
            fontFamily: "'DM Mono', monospace", fontWeight: 500,
          }}>{el.num}</span>
          <span style={{
            fontSize: "clamp(10px, 1.5vw, 17px)", fontWeight: 700,
            color: cat.color, lineHeight: 1, letterSpacing: "-0.02em",
          }}>{el.sym}</span>
          <span style={{
            fontSize: "clamp(3px, 0.48vw, 5.5px)",
            color: "#999", textAlign: "center", lineHeight: 1.15,
            maxWidth: "96%", overflow: "hidden",
            whiteSpace: "normal", wordBreak: "break-word",
            marginTop: 1, fontWeight: 500,
            display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical",
          }}>{el.name}</span>
        </div>
      );
    }

    /* ═══════════════════════ APP ═══════════════════════ */

    function App() {
      const [selected, setSelected] = useState(null);
      const [hoveredCat, setHoveredCat] = useState(null);
      const [mounted, setMounted] = useState(false);
      const detailRef = useRef(null);

      useEffect(() => { setMounted(true); }, []);
      useEffect(() => {
        if (selected && detailRef.current)
          detailRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }, [selected]);

      // Close on Escape
      useEffect(() => {
        const handler = e => { if (e.key === 'Escape') { setSelected(null); setHoveredCat(null); } };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const grid = useMemo(() => {
        const g = {};
        elements.forEach(el => { g[`${el.row}-${el.col}`] = el; });
        return g;
      }, []);

      const rows = [0,1,2,3,4,5,6,7];

      return (
        <div style={{ minHeight: "100vh", padding: "24px 16px", maxWidth: 1400, margin: "0 auto" }}>
            {/* Language Switch */}
            <div style={{
              position: "fixed", top: 12, right: 16, zIndex: 100,
              display: "flex", gap: 2, background: "#fff",
              borderRadius: 8, padding: 3, 
              border: "1.5px solid #e0e0dc",
              boxShadow: "0 2px 8px rgba(0,0,0,0.06)",
              fontFamily: "'DM Sans', sans-serif",
            }}>
              <a href="index.html" style={{
                padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 600,
                color: "#999", textDecoration: "none", cursor: "pointer",
                transition: "all 0.2s",
              }}
              onMouseEnter={e => { e.target.style.color = "#111"; e.target.style.background = "#f0f0ec"; }}
              onMouseLeave={e => { e.target.style.color = "#999"; e.target.style.background = "transparent"; }}
              >DE</a>
              <span style={{
                padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 600,
                background: "#111", color: "#fff", cursor: "default",
              }}>EN</span>
            </div>
          {/* Header */}
          <header style={{
            textAlign: "center", marginBottom: 22,
            opacity: mounted ? 1 : 0, transition: "opacity 0.8s",
          }}>
            <div style={{
              display: "inline-block", padding: "3px 14px", borderRadius: 100,
              background: "#f0f0ec", fontSize: 10, fontWeight: 500, color: "#999",
              letterSpacing: "0.12em", textTransform: "uppercase",
              fontFamily: "'DM Mono', monospace", marginBottom: 6,
            }}>128 Elements · 10 Categories</div>
            <h1 style={{
              fontSize: "clamp(20px, 3.5vw, 40px)", fontWeight: 700,
              letterSpacing: "-0.03em", color: "#111", lineHeight: 1.15,
            }}>
              Periodic Table of{" "}
              <span style={{
                background: "linear-gradient(135deg, #C62828, #E65100, #00695C, #6A1B9A, #1565C0)",
                WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
              }}>Artificial Intelligence</span>
            </h1>
            <p style={{ fontSize: 13, color: "#aaa", marginTop: 4 }}>
              From Foundation Models to Ethics — the entire AI ecosystem at a glance.
            </p>
          </header>

          {/* Legend */}
          <nav aria-label="Categories" style={{
            display: "flex", flexWrap: "wrap", justifyContent: "center",
            gap: 4, marginBottom: 18,
          }}>
            {catEntries.map(([key, cat]) => {
              const active = hoveredCat === key;
              return (
                <button key={key}
                  onClick={() => setHoveredCat(active ? null : key)}
                  style={{
                    display: "flex", alignItems: "center", gap: 4,
                    padding: "3px 9px", borderRadius: 5, cursor: "pointer",
                    background: active ? cat.light : "#fff",
                    border: `1.5px solid ${active ? cat.color : "#e0e0dc"}`,
                    fontSize: 9, fontWeight: 600,
                    color: active ? cat.color : "#888",
                    fontFamily: "'DM Sans', sans-serif",
                    transition: "all 0.2s",
                  }}
                >
                  <span style={{ width: 7, height: 7, borderRadius: 2, background: cat.color, opacity: active ? 1 : 0.5 }} />
                  {cat.name}
                </button>
              );
            })}
          </nav>

          {/* Main Grid */}
          <div role="grid" aria-label="Periodic Table" style={{
            display: "grid",
            gridTemplateColumns: `repeat(${TOTAL_COLS}, minmax(0, 1fr))`,
            gap: 2.5,
          }}>
            {rows.flatMap(row =>
              Array.from({ length: TOTAL_COLS }, (_, col) => {
                const el = grid[`${row}-${col}`];
                if (!el) return <div key={`${row}-${col}`} />;
                return <Cell key={el.num} el={el} selected={selected} setSelected={setSelected} hoveredCat={hoveredCat} />;
              })
            )}
          </div>

          {/* Extended row label */}
          <div style={{
            display: "flex", alignItems: "center", gap: 8,
            margin: "10px 0 4px", paddingLeft: 2,
          }}>
            <span style={{
              fontSize: 8, color: "#bbb", letterSpacing: "0.08em",
              textTransform: "uppercase", fontWeight: 500, whiteSpace: "nowrap",
              fontFamily: "'DM Mono', monospace",
            }}>★ Extended Foundation Models</span>
            <div style={{ flex: 1, height: 1, background: "#e8e8e4" }} />
          </div>

          {/* Extended row grid */}
          <div style={{
            display: "grid",
            gridTemplateColumns: `repeat(${TOTAL_COLS}, minmax(0, 1fr))`,
            gap: 2.5,
          }}>
            {Array.from({ length: TOTAL_COLS }, (_, col) => {
              const el = grid[`9-${col}`];
              if (!el) return <div key={`ext-${col}`} />;
              return <Cell key={el.num} el={el} selected={selected} setSelected={setSelected} hoveredCat={hoveredCat} />;
            })}
          </div>

          {/* Detail Panel */}
          {selected && (
            <div ref={detailRef} style={{
              background: "#fff", border: `2px solid ${CATEGORIES[selected.cat].color}`,
              borderRadius: 12, padding: 18, marginTop: 16,
              animation: "slideUp 0.25s ease",
              boxShadow: `0 4px 30px ${CATEGORIES[selected.cat].color}12`,
            }}>
              <div style={{ display: "flex", gap: 14, alignItems: "flex-start", flexWrap: "wrap" }}>
                <div style={{
                  width: 66, height: 66, borderRadius: 10, flexShrink: 0,
                  background: CATEGORIES[selected.cat].light,
                  border: `2px solid ${CATEGORIES[selected.cat].color}`,
                  display: "flex", flexDirection: "column",
                  alignItems: "center", justifyContent: "center",
                }}>
                  <span style={{
                    fontSize: 9, color: CATEGORIES[selected.cat].color, opacity: 0.5,
                    fontFamily: "'DM Mono', monospace",
                  }}>{selected.num}</span>
                  <span style={{
                    fontSize: 24, fontWeight: 700, color: CATEGORIES[selected.cat].color,
                    lineHeight: 1,
                  }}>{selected.sym}</span>
                </div>
                <div style={{ flex: 1, minWidth: 180 }}>
                  <h3 style={{ fontSize: 17, fontWeight: 700, color: "#111", letterSpacing: "-0.02em", margin: 0 }}>
                    {selected.name}
                  </h3>
                  <span style={{
                    display: "inline-block", padding: "2px 10px", borderRadius: 100,
                    background: CATEGORIES[selected.cat].light,
                    color: CATEGORIES[selected.cat].color,
                    fontSize: 10, fontWeight: 600, marginTop: 4,
                    border: `1px solid ${CATEGORIES[selected.cat].mid}`,
                  }}>{CATEGORIES[selected.cat].name}</span>
                  <p style={{ marginTop: 8, fontSize: 14, color: "#555", lineHeight: 1.65 }}>
                    {selected.desc}
                  </p>
                </div>
                <button onClick={e => { e.stopPropagation(); setSelected(null); }}
                  aria-label="Close"
                  style={{
                    background: "#f7f7f5", border: "1px solid #e8e8e3",
                    color: "#aaa", borderRadius: 8, width: 30, height: 30,
                    cursor: "pointer", fontSize: 13, display: "flex",
                    alignItems: "center", justifyContent: "center",
                  }}>✕</button>
              </div>
            </div>
          )}

          {/* Stats Footer */}
          <div style={{
            display: "flex", justifyContent: "center", gap: 10,
            marginTop: 24, flexWrap: "wrap",
          }}>
            {catEntries.map(([key, cat]) => {
              const count = elements.filter(e => e.cat === key).length;
              return (
                <div key={key} onClick={() => setHoveredCat(hoveredCat === key ? null : key)}
                  style={{
                    textAlign: "center", padding: "5px 8px", borderRadius: 8, cursor: "pointer",
                    background: hoveredCat === key ? cat.light : "#fff",
                    border: `1px solid ${hoveredCat === key ? cat.mid : "#eee"}`,
                    transition: "all 0.2s", minWidth: 54,
                  }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: cat.color }}>{count}</div>
                  <div style={{
                    fontSize: 6.5, color: "#bbb", textTransform: "uppercase",
                    letterSpacing: "0.05em", fontWeight: 500,
                    fontFamily: "'DM Mono', monospace",
                  }}>{cat.name}</div>
                </div>
              );
            })}
          </div>

          <footer style={{
            textAlign: "center", marginTop: 20, padding: "12px 0",
            borderTop: "1px solid #f0f0ec", fontSize: 10, color: "#ccc",
            fontFamily: "'DM Mono', monospace",
          }}>
            Periodic Table of Artificial Intelligence · 2026 · Click any element for details{" · "}<a href="https://godmodeai2025.github.io/MarkZimmermann/" target="_blank" rel="noopener noreferrer" style={{ color: "#bbb", textDecoration: "none", borderBottom: "1px solid #ddd" }} onMouseEnter={e => e.target.style.color = "#666"} onMouseLeave={e => e.target.style.color = "#bbb"}>Imprint</a>
          </footer>
        </div>
      );
    }

    /* ═══════════════════════ MOUNT ═══════════════════════ */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
