  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ═══════════════════════ DATA ═══════════════════════ */

    const CATEGORIES = {
      FM: { name: "Foundation Models", color: "#C62828", light: "#FFEBEE", mid: "#EF9A9A" },
      AR: { name: "Architekturen", color: "#E65100", light: "#FFF3E0", mid: "#FFCC80" },
      LP: { name: "Lernparadigmen", color: "#9E7A15", light: "#FFF8E1", mid: "#FFE082" },
      DA: { name: "Daten & Processing", color: "#00695C", light: "#E0F2F1", mid: "#80CBC4" },
      TF: { name: "Tools & Frameworks", color: "#37474F", light: "#ECEFF1", mid: "#B0BEC5" },
      AP: { name: "Anwendungen", color: "#6A1B9A", light: "#F3E5F5", mid: "#CE93D8" },
      ES: { name: "Ethik & Safety", color: "#BF360C", light: "#FBE9E7", mid: "#FFAB91" },
      IN: { name: "Infrastruktur", color: "#1565C0", light: "#E3F2FD", mid: "#90CAF9" },
      AG: { name: "Agenten &Tic", color: "#00838F", light: "#E0F7FA", mid: "#80DEEA" },
      NL: { name: "NLP & Sprache", color: "#283593", light: "#E8EAF6", mid: "#9FA8DA" },
    };

    const elements = [
      { sym: "GPT", num: 1, name: "Gen. Pre-trained Transformer", cat: "FM", row: 0, col: 0, desc: "OpenAI's Sprachmodell-Familie und das kommerziell erfolgreichste LLM weltweit. Von GPT-3.5 über GPT-4 bis zu GPT-4o und den Reasoning-Modellen o1/o3 — jede Generation brachte Durchbrüche in Text, Code und multimodalem Verständnis. GPT-Modelle bilden das Rückgrat von ChatGPT, Microsoft Copilot und Tausenden von API-Integrationen. Die Architektur basiert auf Decoder-only Transformern mit autoregessiver Next-Token-Prediction." },
      { sym: "Cld", num: 2, name: "Claude", cat: "FM", row: 0, col: 1, desc: "Anthropic's KI-Assistent, gebaut mit dem Ziel maximaler Sicherheit und Nützlichkeit. Claude nutzt Constitutional AI (CAI) als Alignment-Methode, bei der das Modell anhand einer Verfassung ethischer Prinzipien trainiert wird. Mit über 200.000 Token Kontextfenster eignet sich Claude besonders für lange Dokumente, komplexe Analysen und Code. Claude Code ermöglicht agentic coding direkt im Terminal." },
      { sym: "Gem", num: 3, name: "Gemini", cat: "FM", row: 0, col: 14, desc: "Google DeepMind's multimodales Flaggschiff-Modell, das Text, Bild, Audio und Video nativ in einer Architektur verarbeitet. Gemini wurde von Grund auf multimodal konzipiert — nicht als Zusammenführung separater Modelle. Die Familie umfasst Ultra, Pro und Flash-Varianten für unterschiedliche Performance-Anforderungen. Gemini ist tief in Googles Produktökosystem integriert: Search, Workspace, Android und Cloud." },
      { sym: "Lla", num: 4, name: "LLaMA", cat: "FM", row: 0, col: 15, desc: "Meta's Open-Source LLM-Familie, die das Ökosystem offener Sprachmodelle maßgeblich geprägt hat. LLaMA-Modelle werden von der Community massiv weiterentwickelt — Alpaca, Vicuna und tausende Fine-Tuned Varianten basieren darauf. Die offene Lizenz ermöglicht kommerzielle Nutzung und hat den Wettbewerb zwischen Open- und Closed-Source Modellen befeuert. LLaMA 3 erreichte erstmals GPT-4-Niveau in vielen Benchmarks." },
      { sym: "Mis", num: 5, name: "Mistral", cat: "FM", row: 0, col: 16, desc: "Europäisches KI-Unternehmen aus Paris, das mit effizienten Open-Source-Modellen den Markt aufmischt. Mistral nutzt Mixture-of-Experts (MoE) Architektur, um bei weniger aktivem Compute hohe Qualität zu liefern. Die Modelle sind besonders schnell in der Inferenz und eignen sich ideal für latenz-sensitive Anwendungen. Als europäisches Unternehmen spielt Mistral eine wichtige Rolle in der Debatte um digitale Souveränität." },
      { sym: "Grk", num: 6, name: "Grok", cat: "FM", row: 0, col: 17, desc: "xAI's Sprachmodell, gegründet von Elon Musk als Alternative zu OpenAI. Grok hat exklusiven Echtzeit-Zugang zu X/Twitter-Daten, was es für aktuelle Ereignisse und Trending Topics besonders nützlich macht. Das Modell zeichnet sich durch einen direkten, humorvollen Kommunikationsstil aus. Grok wird als Open-Source-Modell angeboten und ist auf xAI's eigener Colossus-GPU-Infrastruktur trainiert." },
      { sym: "Trf", num: 7, name: "Transformer", cat: "AR", row: 1, col: 0, desc: "Die Architektur, die 2017 die KI-Revolution auslöste — vorgestellt im Paper 'Attention Is All You Need' von Google. Transformer ersetzen rekurrente Netzwerke durch parallele Self-Attention-Mechanismen und ermöglichen damit dramatisch schnelleres Training. Praktisch jedes moderne Sprachmodell (GPT, Claude, Gemini, LLaMA) basiert auf dieser Architektur. Der Schlüssel liegt in der Fähigkeit, beliebig lange Abhängigkeiten in Sequenzen zu erfassen." },
      { sym: "Att", num: 8, name: "Self-Attention", cat: "AR", row: 1, col: 1, desc: "Der Kernmechanismus moderner Transformer-Architekturen. Self-Attention berechnet für jedes Token im Input, wie stark es auf jedes andere Token achten soll — eine gewichtete Summe aller Kontextinformationen. Dies erlaubt es dem Modell, relevante Informationen aus beliebigen Positionen des Inputs zu beziehen, egal wie weit entfernt. Die Rechenkosten skalieren quadratisch mit der Sequenzlänge, weshalb effizientere Varianten wie Flash Attention entwickelt wurden." },
      { sym: "CNN", num: 9, name: "Convolutional NN", cat: "AR", row: 1, col: 2, desc: "Convolutional Neural Networks revolutionierten ab 2012 die Bilderkennung und dominierten Computer Vision für Jahre. CNNs verwenden lernbare Filter (Kernels), die über das Bild gleiten und hierarchisch Merkmale extrahieren — von Kanten über Texturen bis zu komplexen Objekten. Architekturen wie ResNet, VGG und EfficientNet wurden zu Standards. Obwohl Vision Transformer (ViT) CNNs in vielen Benchmarks überholt haben, bleiben CNNs für Edge-Devices wegen ihrer Effizienz relevant." },
      { sym: "RNN", num: 10, name: "Recurrent NN", cat: "AR", row: 1, col: 3, desc: "Rekurrente Neuronale Netze verarbeiten Sequenzen schrittweise und behalten Informationen in einem Hidden State. LSTMs (Long Short-Term Memory) und GRUs (Gated Recurrent Units) lösten das Vanishing-Gradient-Problem und ermöglichten das Lernen langer Abhängigkeiten. RNNs waren jahrelang Standard für Sprachverarbeitung, maschinelle Übersetzung und Zeitreihenanalyse. Seit 2017 wurden sie weitgehend durch Transformer ersetzt, finden aber in spezialisierten Anwendungen noch Verwendung." },
      { sym: "GAN", num: 11, name: "Gen. Adversarial Net", cat: "AR", row: 1, col: 4, desc: "Generative Adversarial Networks bestehen aus zwei Netzwerken im Wettstreit: Ein Generator erzeugt Fake-Daten, ein Discriminator versucht Fakes zu erkennen. Durch dieses adversariale Training lernt der Generator, immer realistischere Daten zu produzieren. GANs waren bahnbrechend für Bildgenerierung (StyleGAN, BigGAN), Bildverbesserung (Super-Resolution) und Datensynthese. Die Architektur ist berüchtigt für instabiles Training (Mode Collapse) und wurde für Bilderzeugung weitgehend durch Diffusion Models abgelöst." },
      { sym: "VAE", num: 12, name: "Variational Autoencoder", cat: "AR", row: 1, col: 5, desc: "Variational Autoencoder lernen eine komprimierte, probabilistische Repräsentation von Daten in einem latenten Raum. Der Encoder komprimiert Input in eine Gauß-Verteilung, der Decoder rekonstruiert daraus neue Samples. VAEs sind theoretisch elegant und ermöglichen kontrollierte Generierung durch Interpolation im latenten Raum. Sie bilden einen Baustein von Latent Diffusion Models (z.B. Stable Diffusion), wo der VAE-Encoder Bilder in den latenten Raum komprimiert." },
      { sym: "Dif", num: 13, name: "Diffusion Models", cat: "AR", row: 1, col: 6, desc: "Diffusion Models lernen, schrittweise Rauschen zu einem klaren Bild zu entfernen — ein iterativer Denoising-Prozess. Die Technik basiert auf thermodynamischen Prinzipien und liefert qualitativ hochwertigere, stabilere Ergebnisse als GANs. Diffusion ist die Architektur hinter DALL-E 3, Stable Diffusion, Midjourney und praktisch allen modernen Bildgeneratoren. Der Nachteil ist die langsame Inferenz durch viele Denoising-Schritte, wofür Techniken wie DDIM und Consistency Models entwickelt wurden." },
      { sym: "MoE", num: 14, name: "Mixture of Experts", cat: "AR", row: 1, col: 7, desc: "Mixture of Experts (MoE) aktiviert pro Input nur einen kleinen Teil des Gesamtmodells über gelerntes Routing. Ein Gating-Netzwerk entscheidet, welche Experten-Subnetze für jedes Token zuständig sind — typisch 2 von z.B. 64 Experten. Dies ermöglicht Modelle mit riesiger Gesamtkapazität bei moderatem Rechenaufwand pro Inferenz. Mixtral von Mistral und Googles Switch Transformer nutzen MoE, und GPT-4 wird ebenfalls als MoE-Modell vermutet." },
      { sym: "SSM", num: 15, name: "State Space Model", cat: "AR", row: 1, col: 10, desc: "State Space Models wie Mamba bieten eine Alternative zu Transformern mit linearer statt quadratischer Komplexität. Sie basieren auf der Theorie linearer dynamischer Systeme und können Sequenzen ohne Attention-Mechanismus effizient verarbeiten. Besonders bei sehr langen Kontexten (>100k Tokens) zeigen SSMs Vorteile in Geschwindigkeit und Speicherverbrauch. Hybrid-Architekturen, die SSM-Layer mit Attention-Layern kombinieren, gewinnen zunehmend an Popularität." },
      { sym: "GNN", num: 16, name: "Graph Neural Net", cat: "AR", row: 1, col: 11, desc: "Graph Neural Networks lernen auf Daten, die als Graphen strukturiert sind — Knoten mit Verbindungen (Kanten). Durch Message Passing tauschen Knoten Informationen mit ihren Nachbarn aus und aktualisieren ihre Repräsentationen. GNNs werden eingesetzt für Moleküldesign (Proteinstruktur), soziale Netzwerkanalyse, Empfehlungssysteme und Betrugserkennung. Architekturen wie GCN, GAT und GraphSAGE adressieren verschiedene Graphtypen und Skalierungsanforderungen." },
      { sym: "MHd", num: 17, name: "Multi-Head Attention", cat: "AR", row: 1, col: 12, desc: "Multi-Head Attention führt Self-Attention mehrfach parallel mit verschiedenen gelernten Projektionen durch. Jeder Attention-Head kann unterschiedliche Beziehungsmuster lernen — einer achtet auf syntaktische Nähe, ein anderer auf semantische Ähnlichkeit. Die Ergebnisse aller Heads werden konkateniert und linear projiziert. GPT-4 verwendet vermutlich über 100 Attention Heads pro Layer, was eine extrem reichhaltige Kontextmodellierung ermöglicht." },
      { sym: "KVc", num: 18, name: "KV-Cache", cat: "AR", row: 1, col: 13, desc: "KV-Cache speichert bereits berechnete Key- und Value-Vektoren während der autoregressiven Generierung. Ohne KV-Cache müsste bei jedem neuen Token die gesamte Attention über alle bisherigen Tokens neu berechnet werden. Der Cache eliminiert diese redundante Berechnung und beschleunigt die Token-Generierung drastisch. Allerdings wächst der Speicherbedarf linear mit der Sequenzlänge, weshalb Techniken wie PagedAttention (vLLM) den Cache-Speicher intelligent verwalten." },
      { sym: "LoR", num: 19, name: "LoRA", cat: "AR", row: 1, col: 14, desc: "Low-Rank Adaptation (LoRA) ermöglicht effizientes Fine-Tuning, indem nur kleine, zusätzliche Matrizen trainiert werden. Statt alle Milliarden Parameter eines Foundation Models zu ändern, fügt LoRA pro Layer zwei kleine Matrizen hinzu (Rang 4-64). Dies reduziert den Speicherbedarf für Fine-Tuning um 90%+ und ermöglicht Anpassung auf Consumer-GPUs. QLoRA kombiniert LoRA mit Quantisierung und macht Fine-Tuning von 70B-Modellen auf einer einzigen GPU möglich." },
      { sym: "QAn", num: 20, name: "Quantisierung", cat: "AR", row: 1, col: 15, desc: "Quantisierung komprimiert Modellgewichte von 32-bit oder 16-bit Floating Point auf 8-bit, 4-bit oder sogar 2-bit Integer. Dies reduziert Speicherbedarf und Inferenz-Kosten dramatisch — ein 70B-Modell passt quantisiert auf eine einzelne Consumer-GPU. Moderne Quantisierungsmethoden wie GPTQ, AWQ und GGUF erhalten die Modellqualität erstaunlich gut. Die Technik ist entscheidend für lokale LLM-Nutzung und Edge Deployment." },
      { sym: "Emb", num: 21, name: "Embeddings", cat: "AR", row: 1, col: 16, desc: "Embeddings übersetzen diskrete Konzepte (Wörter, Sätze, Bilder) in dichte Vektoren, in denen semantische Ähnlichkeit als geometrische Nähe abgebildet wird. Ähnliche Bedeutungen liegen nahe beieinander im hochdimensionalen Raum — 'König' minus 'Mann' plus 'Frau' ergibt ungefähr 'Königin'. Embeddings sind fundamental für RAG-Systeme, Suchmaschinen und Empfehlungssysteme. Modelle wie OpenAI ada-002, Cohere Embed und Sentence-BERT erzeugen hochqualitative Text-Embeddings." },
      { sym: "Tok", num: 22, name: "Tokenizer", cat: "AR", row: 1, col: 17, desc: "Tokenizer zerlegen Text in Sub-Word-Einheiten (Tokens), die das Modell als Input verarbeitet. Byte-Pair Encoding (BPE), SentencePiece und WordPiece sind die gängigen Verfahren, die häufige Zeichenkombinationen zu einzelnen Tokens zusammenfassen. Die Wahl des Tokenizers beeinflusst Effizienz, Mehrsprachigkeit und Kontextfenster-Nutzung erheblich. Ein typisches Wort benötigt 1-3 Tokens; Programmiersprachen und nicht-lateinische Schriften sind oft weniger effizient tokenisiert." },
      { sym: "SuL", num: 23, name: "Supervised Learning", cat: "LP", row: 2, col: 0, desc: "Supervised Learning ist die klassischste Form des maschinellen Lernens: Das Modell lernt aus Paaren von Input und gewünschtem Output. Jedes Trainingsbeispiel hat ein Label — Katze/Hund, Spam/Ham, Preis. Das Modell minimiert den Fehler zwischen Vorhersage und Label über Gradient Descent. Supervised Learning ist Basis für Klassifikation, Regression und auch die Pre-Training-Phase von LLMs (Next-Token als Label)." },
      { sym: "UsL", num: 24, name: "Unsupervised Learning", cat: "LP", row: 2, col: 1, desc: "Unsupervised Learning entdeckt Strukturen und Muster in Daten ohne vorgegebene Labels. Clustering-Algorithmen (K-Means, DBSCAN, HDBSCAN) gruppieren ähnliche Datenpunkte, Dimensionsreduktion (PCA, t-SNE, UMAP) visualisiert hochdimensionale Daten. Anomalie-Erkennung identifiziert Ausreißer ohne zu wissen, wie 'normal' aussieht. In der Praxis wird Unsupervised Learning oft für Datenexploration, Feature Engineering und als Vorstufe für Supervised Learning eingesetzt." },
      { sym: "RfL", num: 25, name: "Reinforcement Learning", cat: "LP", row: 2, col: 2, desc: "Reinforcement Learning trainiert einen Agenten, der durch Interaktion mit einer Umgebung eine optimale Strategie (Policy) lernt. Der Agent erhält Belohnungen (Rewards) für gute und Bestrafungen für schlechte Aktionen und maximiert den kumulativen Reward. RL war entscheidend für AlphaGo, Robotik-Steuerung und Game-Playing (Atari, StarCraft). In LLMs bildet RL die Basis für RLHF — die Feinabstimmung von Sprachmodellen auf menschliche Präferenzen." },
      { sym: "SSL", num: 26, name: "Self-Supervised", cat: "LP", row: 2, col: 3, desc: "Self-Supervised Learning erzeugt Trainingssignale direkt aus den Daten selbst, ohne manuell erstellte Labels. Bei Masked Language Modeling (BERT) werden zufällige Wörter verdeckt und das Modell lernt sie vorherzusagen; bei autoregressivem Training (GPT) wird das jeweils nächste Token vorhergesagt. Contrastive Learning (CLIP, SimCLR) lernt, welche Datenpaare zusammengehören und welche nicht. Diese Paradigmen ermöglichen Training auf riesigen, unlabeled Datensätzen — die Grundlage aller Foundation Models." },
      { sym: "TrL", num: 27, name: "Transfer Learning", cat: "LP", row: 2, col: 4, desc: "Transfer Learning überträgt Wissen, das ein Modell auf einer Aufgabe gelernt hat, auf eine neue, verwandte Aufgabe. Ein auf Millionen Bildern vortrainiertes Modell kann mit wenigen hundert Beispielen für medizinische Bildanalyse angepasst werden. Dieses Paradigma ist der Kern des Foundation-Model-Ansatzes: Einmal teuer pre-trainen, vielfach günstig spezialisieren. Transfer Learning hat die Schwelle für KI-Anwendungen massiv gesenkt, da nicht mehr jedes Unternehmen von Null trainieren muss." },
      { sym: "FwL", num: 28, name: "Few-Shot Learning", cat: "LP", row: 2, col: 5, desc: "Few-Shot Learning ermöglicht Modellen, aus nur wenigen Beispielen (1-10) eine neue Aufgabe zu erlernen. Bei LLMs geschieht dies über In-Context Learning: Die Beispiele werden als Teil des Prompts mitgegeben, ohne die Modellgewichte zu ändern. GPT-3 demonstrierte 2020 erstmals, dass große Sprachmodelle beeindruckende Few-Shot-Fähigkeiten haben. In der Computer Vision nutzen Techniken wie Siamese Networks und Prototypical Networks metrisches Lernen für Few-Shot-Klassifikation." },
      { sym: "ZeS", num: 29, name: "Zero-Shot", cat: "LP", row: 2, col: 6, desc: "Zero-Shot-Fähigkeit bedeutet, dass ein Modell Aufgaben lösen kann, für die es keine expliziten Beispiele gesehen hat. Das Modell generalisiert allein über sein Sprachverständnis — 'Klassifiziere diesen Text als positiv oder negativ' funktioniert ohne Trainingsbeispiele für Sentiment. CLIP demonstrierte Zero-Shot-Bilderkennung: Es klassifiziert Bilder in beliebige Kategorien, ohne je dafür trainiert worden zu sein. Zero-Shot ist ein starker Indikator für echtes Sprachverständnis und Generalisierungsfähigkeit." },
      { sym: "RHF", num: 30, name: "RLHF", cat: "LP", row: 2, col: 7, desc: "Reinforcement Learning from Human Feedback ist die Technik, die ChatGPT möglich machte — sie richtet LLMs an menschlichen Präferenzen aus. Menschen bewerten verschiedene Modellantworten (besser/schlechter), daraus wird ein Reward Model trainiert, das dann per RL das Sprachmodell optimiert. RLHF macht Modelle hilfreicher, ehrlicher und sicherer, kann aber auch zu übermäßiger Vorsicht (Refusals) oder Sycophancy (zu viel Zustimmung) führen. Die Technik wurde von OpenAI und Anthropic maßgeblich entwickelt und verfeinert." },
      { sym: "DPO", num: 31, name: "Direct Preference Opt.", cat: "LP", row: 2, col: 8, desc: "Direct Preference Optimization (DPO) vereinfacht RLHF, indem es den Umweg über ein separates Reward Model eliminiert. Statt RL zu nutzen, optimiert DPO das Sprachmodell direkt anhand von Präferenzpaaren (bevorzugte vs. abgelehnte Antwort). DPO ist mathematisch äquivalent zu einer bestimmten Form von RLHF, aber einfacher zu implementieren und stabiler im Training. Viele neuere Modelle nutzen DPO oder Varianten wie IPO und KTO für ihr Alignment." },
      { sym: "CoT", num: 32, name: "Chain-of-Thought", cat: "LP", row: 2, col: 9, desc: "Chain-of-Thought Prompting bringt LLMs dazu, Probleme Schritt für Schritt durchzudenken, bevor sie eine Antwort geben. Durch die Aufforderung 'Denke Schritt für Schritt' oder durch Beispiele mit explizitem Denkprozess steigt die Accuracy bei Mathematik und Logik dramatisch. OpenAI's o1-Modell internalisiert Chain-of-Thought als verborgenen Reasoning-Prozess, der automatisch bei komplexen Aufgaben aktiviert wird. CoT zeigt, dass LLMs besser 'denken' wenn sie ihren Denkprozess externalisieren können." },
      { sym: "ICL", num: 33, name: "In-Context Learning", cat: "LP", row: 2, col: 10, desc: "In-Context Learning ist die bemerkenswerte Fähigkeit großer LLMs, aus Beispielen im Prompt zu lernen — ohne jede Gewichtsänderung. Man gibt dem Modell einige Input-Output-Paare und es extrapoliert das Muster auf neue Inputs. Dieses emergente Verhalten tritt erst ab einer bestimmten Modellgröße auf und ist theoretisch noch nicht vollständig verstanden. ICL macht LLMs extrem flexibel: Neue Aufgaben erfordern nur neue Prompts, kein Retraining." },
      { sym: "CuL", num: 34, name: "Curriculum Learning", cat: "LP", row: 2, col: 11, desc: "Curriculum Learning organisiert Trainingsdaten von einfach zu schwer, analog zum menschlichen Lernen. Das Modell meistert zunächst einfache Beispiele und wird schrittweise mit komplexeren konfrontiert. Studien zeigen schnellere Konvergenz und teilweise bessere Generalisierung gegenüber zufälligem Training. In der LLM-Welt wird Curriculum Learning bei der Pre-Training-Daten-Mischung eingesetzt — z.B. qualitativ höherwertige Daten in späteren Trainingsphasen." },
      { sym: "FdL", num: 35, name: "Federated Learning", cat: "LP", row: 2, col: 12, desc: "Federated Learning trainiert ML-Modelle dezentral auf verteilten Geräten, ohne dass Rohdaten zentralisiert werden müssen. Jedes Gerät (Smartphone, Krankenhaus-Server) trainiert lokal und teilt nur Modell-Updates (Gradienten) mit einem zentralen Server. Apple nutzt Federated Learning für Keyboard-Predictions, Google für Gboard — die Privatsphäre der Nutzer bleibt gewahrt. Die Technik ist besonders relevant für Gesundheitsdaten, Finanzinstitutionen und andere datenschutzsensible Bereiche." },
      { sym: "MtL", num: 36, name: "Meta-Learning", cat: "LP", row: 2, col: 13, desc: "Meta-Learning — 'Lernen zu lernen' — trainiert Modelle, die sich schnell an völlig neue Aufgaben anpassen können. Algorithmen wie MAML (Model-Agnostic Meta-Learning) optimieren Modellinitialisierungen, von denen aus wenige Gradient-Updates für eine neue Aufgabe ausreichen. Meta-Learning ist verwandt mit Few-Shot Learning und zielt auf generalisierte Lernfähigkeit statt auf einzelne Aufgaben. In der Robotik ermöglicht es Robotern, neue Manipulationsaufgaben in wenigen Versuchen zu erlernen." },
      { sym: "CtL", num: 37, name: "Contrastive Learning", cat: "LP", row: 2, col: 14, desc: "Contrastive Learning trainiert Modelle durch den Vergleich von ähnlichen (positiven) und unähnlichen (negativen) Datenpaaren. Das Modell lernt, positive Paare im Embedding-Raum zusammenzuziehen und negative auseinanderzudrücken. CLIP nutzt Contrastive Learning zwischen Bild-Text-Paaren, SimCLR zwischen augmentierten Versionen desselben Bildes. Die Technik ist zentral für selbstüberwachtes Lernen und produziert hervorragende Repräsentationen ohne manuelle Labels." },
      { sym: "DiT", num: 38, name: "Distillation", cat: "LP", row: 2, col: 15, desc: "Knowledge Distillation überträgt das Wissen eines großen, leistungsstarken Teacher-Modells auf ein kleineres, schnelleres Student-Modell. Der Student lernt nicht nur die korrekten Antworten, sondern auch die Wahrscheinlichkeitsverteilungen (Soft Labels) des Teachers — darin steckt reichhaltigeres Wissen. DistilBERT erreicht 97% der BERT-Performance bei 60% der Größe. Distillation ist entscheidend für den Einsatz von KI auf mobilen Geräten und ressourcenbeschränkten Umgebungen." },
      { sym: "FnT", num: 39, name: "Fine-Tuning", cat: "LP", row: 2, col: 16, desc: "Fine-Tuning passt ein vortrainiertes Foundation Model an spezifische Aufgaben oder Domänen an, indem auf domänenspezifischen Daten nachtrainiert wird. Vollständiges Fine-Tuning aktualisiert alle Gewichte, Parameter-effiziente Methoden (LoRA, Adapter) nur einen Bruchteil. Instruction Fine-Tuning bringt Basismodellen bei, Anweisungen zu befolgen — der Schritt, der GPT-3 zu InstructGPT machte. Die Qualität und Diversität der Fine-Tuning-Daten bestimmt maßgeblich die Modellqualität." },
      { sym: "PrT", num: 40, name: "Pre-Training", cat: "LP", row: 2, col: 17, desc: "Pre-Training ist die initiale, compute-intensive Phase, in der ein Foundation Model auf riesigen Datenmengen trainiert wird. Bei LLMs bedeutet dies typischerweise Next-Token-Prediction auf Billionen von Text-Tokens aus Web-Crawls, Büchern und Code. Diese Phase kostet Millionen Dollar an GPU-Stunden und produziert ein Basismodell mit breitem Weltwissen. Die Qualität und Zusammensetzung der Pre-Training-Daten (Data Mix) ist einer der am besten gehüteten Geheimnisse der KI-Labore." },
      { sym: "RAG", num: 41, name: "Retrieval-Augmented Gen.", cat: "DA", row: 3, col: 0, desc: "Retrieval-Augmented Generation kombiniert LLMs mit externer Wissenssuche, um aktuellere und faktenbasierte Antworten zu erzeugen. Statt nur auf trainiertes Wissen zu vertrauen, sucht RAG relevante Dokumente aus einer Wissensdatenbank und fügt sie als Kontext in den Prompt ein. Dies reduziert Halluzinationen drastisch und ermöglicht es, proprietäres Unternehmenswissen einzubinden, ohne das Modell neu zu trainieren. RAG ist der De-facto-Standard für Enterprise-KI-Anwendungen und Chatbots mit domänenspezifischem Wissen." },
      { sym: "VeD", num: 42, name: "Vektordatenbank", cat: "DA", row: 3, col: 1, desc: "Vektordatenbanken speichern und durchsuchen Embedding-Vektoren mit hocheffizienten Nearest-Neighbor-Algorithmen. Pinecone, Weaviate, Chroma, Qdrant, Milvus und pgvector sind die bekanntesten Vertreter für unterschiedliche Skalierungsanforderungen. Die Suche basiert auf Ähnlichkeitsmaßen wie Cosine Similarity oder Dot Product und findet semantisch verwandte Inhalte in Millisekunden. Vektordatenbanken sind das Rückgrat jedes RAG-Systems und jeder semantischen Suche." },
      { sym: "FtE", num: 43, name: "Feature Engineering", cat: "DA", row: 3, col: 2, desc: "Feature Engineering ist die Kunst, Rohdaten in informative Merkmale für ML-Modelle zu transformieren. Klassische Techniken umfassen Normalisierung, One-Hot-Encoding, Binning, Aggregation und domänenspezifische Berechnungen. Gutes Feature Engineering kann die Modellperformance stärker verbessern als ein Wechsel des Algorithmus. In der Deep-Learning-Ära übernehmen neuronale Netze zunehmend die automatische Feature-Extraktion, aber für tabellarische Daten bleibt manuelles Feature Engineering entscheidend." },
      { sym: "DAu", num: 44, name: "Data Augmentation", cat: "DA", row: 3, col: 3, desc: "Data Augmentation erzeugt künstlich neue Trainingsdaten durch Transformationen bestehender Beispiele. Bei Bildern: Rotation, Spiegelung, Zuschnitt, Farbveränderung, Cutout. Bei Text: Paraphrasierung, Synonym-Ersetzung, Back-Translation, LLM-generierte Varianten. Augmentation verhindert Overfitting und verbessert die Generalisierung, besonders bei kleinen Datensätzen. RandAugment und AugMax automatisieren die Wahl der optimalen Augmentierungsstrategien." },
      { sym: "ETL", num: 45, name: "ETL Pipeline", cat: "DA", row: 3, col: 4, desc: "ETL-Pipelines (Extract, Transform, Load) automatisieren den Datenfluss von Rohquellen bis zum trainingsfertig aufbereiteten Datensatz. Extract sammelt Daten aus APIs, Datenbanken, Web-Scraping und Dateisystemen. Transform bereinigt, normalisiert, dedupliziert und strukturiert die Daten. Load speichert sie in Formaten, die ML-Frameworks effizient lesen können. Tools wie Apache Spark, dbt, Airflow und Dagster orchestrieren diese Pipelines." },
      { sym: "LaD", num: 46, name: "Labeling", cat: "DA", row: 3, col: 5, desc: "Labeling ist der oft unterschätzte Flaschenhals beim ML-Training: Menschen annotieren Daten mit den korrekten Kategorien oder Markierungen. RLHF-Annotation erfordert, dass Rater Modellantworten nach Qualität ranken — eine subjektive, teure Aufgabe. Bounding Boxes für Objekterkennung, Named Entity Tags für NLP, Segmentierungsmasken für Bilder — jeder ML-Anwendungsfall hat eigene Annotationsanforderungen. Plattformen wie Scale AI, Labelbox und Amazon Mechanical Turk haben die Labeling-Industrie professionalisiert." },
      { sym: "SyD", num: 47, name: "Synthetische Daten", cat: "DA", row: 3, col: 6, desc: "Synthetische Daten werden von KI-Modellen generiert, um Trainingsdatensätze zu ergänzen oder Datenschutzprobleme zu umgehen. LLMs können Trainingsbeispiele für Textklassifikation erzeugen, Diffusion Models synthetische Bilder für Computer Vision. Microsoft's Phi-Modelle wurden teilweise auf GPT-4-generierten synthetischen Daten trainiert — ein kontroverser, aber effektiver Ansatz. Synthetische Daten ermöglichen Training für seltene Szenarien (Unfälle, Krankheiten), die in realen Daten unterrepräsentiert sind." },
      { sym: "PrP", num: 48, name: "Preprocessing", cat: "DA", row: 3, col: 7, desc: "Preprocessing umfasst alle Schritte der Datenbereinigung und -transformation vor dem eigentlichen Training. Für Text: Deduplizierung, Qualitätsfilterung, Spracherkennung, Entfernung von Boilerplate und toxischen Inhalten. Für Bilder: Größenanpassung, Normalisierung, Ausrichtung. Die Qualität des Preprocessings bestimmt die Obergrenze der Modellqualität — 'Garbage In, Garbage Out' gilt besonders für KI. Tools wie Common Crawl Pipeline und RedPajama haben Standards für großangelegtes Text-Preprocessing gesetzt." },
      { sym: "GrR", num: 49, name: "GraphRAG", cat: "DA", row: 3, col: 14, desc: "GraphRAG erweitert klassisches RAG um Wissensgraphen, die Beziehungen zwischen Entitäten explizit modellieren. Statt isolierte Textchunks zu retrieven, navigiert GraphRAG verknüpfte Konzepte — 'Wer arbeitet wo?', 'Welche Produkte hängen zusammen?'. Microsoft Research hat GraphRAG als Open-Source-Framework veröffentlicht, das automatisch Wissensgraphen aus Dokumenten extrahiert. Besonders für Multi-Hop-Fragen ('Welche Firmen in der Lieferkette von X sind von Y betroffen?') zeigt GraphRAG deutliche Vorteile." },
      { sym: "ChS", num: 50, name: "Chunking", cat: "DA", row: 3, col: 15, desc: "Chunking-Strategien bestimmen, wie Dokumente für RAG in Abschnitte zerteilt werden — eine kritische Designentscheidung. Fixed-Size Chunking schneidet nach Zeichenzahl, Semantic Chunking an thematischen Grenzen, Recursive Chunking hierarchisch nach Überschriften und Absätzen. Agentic Chunking nutzt LLMs, um optimale Schnittgrenzen zu finden. Zu kleine Chunks verlieren Kontext, zu große überschwemmen das Kontextfenster — die richtige Balance ist entscheidend für RAG-Qualität." },
      { sym: "OCR", num: 51, name: "OCR", cat: "DA", row: 3, col: 16, desc: "Optical Character Recognition extrahiert maschinenlesbaren Text aus Bildern, gescannten Dokumenten und PDFs. Moderne OCR-Systeme basieren auf Deep Learning (Tesseract 5, PaddleOCR, EasyOCR) und erreichen nahezu perfekte Genauigkeit bei gedrucktem Text. Multimodale LLMs wie GPT-4V und Claude können OCR implizit durchführen und dabei auch Layout und Kontext verstehen. OCR ist unverzichtbar für die Digitalisierung von Archiven, Rechnungsverarbeitung und barrierefreie Dokumente." },
      { sym: "WCr", num: 52, name: "Web Crawling", cat: "DA", row: 3, col: 17, desc: "Web Crawling sammelt systematisch Daten aus dem Internet für ML-Training, RAG-Wissensbasen und Suchindizes. Common Crawl stellt monatlich Petabytes gecrawlter Webdaten frei zur Verfügung — die Basis fast aller LLM-Trainingskorpora. Crawling-Pipelines müssen robots.txt respektieren, Duplikate filtern, Qualität bewerten und Urheberrecht beachten. Spezialisierte Crawler wie Scrapy, Firecrawl und Apify extrahieren strukturierte Daten aus Webseiten für RAG-Anwendungen." },
      { sym: "PyT", num: 53, name: "PyTorch", cat: "TF", row: 4, col: 0, desc: "PyTorch ist Meta's Deep-Learning-Framework und der unangefochtene Standard in der KI-Forschung. Dynamic Computation Graphs ermöglichen flexibles, Python-nahes Programmieren — debuggen mit print-Statements statt starrer Graph-Definitionen. Über 80% aller ML-Paper auf Konferenzen nutzen PyTorch. Mit PyTorch 2.0 wurde torch.compile eingeführt, das Performance-Lücken zu TensorFlow bei Production Deployment schließt." },
      { sym: "TnF", num: 54, name: "TensorFlow", cat: "TF", row: 4, col: 1, desc: "TensorFlow ist Google's ML-Framework mit starkem Fokus auf Production Deployment und Skalierung. TensorFlow Lite ermöglicht ML auf Mobile und Edge-Devices, TensorFlow.js ML im Browser, TensorFlow Serving skalierbare Inferenz. Die Keras-API vereinfacht das High-Level-Modelldesign. Obwohl PyTorch in der Forschung dominiert, bleibt TensorFlow in vielen Produktionsumgebungen und bei Google-zentrierten Stacks die erste Wahl." },
      { sym: "HgF", num: 55, name: "Hugging Face", cat: "TF", row: 4, col: 2, desc: "Hugging Face hat sich zum GitHub der KI-Welt entwickelt — ein Open-Source-Ökosystem mit über 500.000 Modellen. Die Transformers Library bietet einheitliche APIs für Tausende vortrainierter Modelle, der Model Hub ermöglicht einfaches Teilen und Downloaden. Datasets, Spaces (Demo-Apps), AutoTrain und Inference Endpoints komplettieren die Plattform. Hugging Face demokratisiert ML-Zugang und ist oft der erste Anlaufpunkt für Entwickler, die mit KI arbeiten wollen." },
      { sym: "LCh", num: 56, name: "LangChain", cat: "TF", row: 4, col: 3, desc: "LangChain ist das populärste Framework für die Entwicklung von LLM-basierten Anwendungen und Agenten. Es bietet Abstraktionen für Chains (sequenzielle LLM-Aufrufe), Agents (autonome Tool-Nutzung), Memory (Konversationsgedächtnis) und RAG-Pipelines. LangChain unterstützt alle großen LLM-Provider und integriert Hunderte von Tools und Datenquellen. Kritiker bemängeln Über-Abstraktion und häufige Breaking Changes, dennoch hat es die LLM-Application-Entwicklung maßgeblich beschleunigt." },
      { sym: "LId", num: 57, name: "LlamaIndex", cat: "TF", row: 4, col: 4, desc: "LlamaIndex (ehemals GPT Index) ist ein Daten-Framework, das den Zugang von LLMs zu externen Datenquellen vereinfacht. Es spezialisiert sich auf Indexierung, Retrieval und Query-Verarbeitung über diverse Datenformate — PDFs, Datenbanken, APIs, Notion, Slack. Die Data Agent-Architektur ermöglicht komplexe Abfragen über mehrere Datenquellen hinweg. LlamaIndex ist besonders stark bei strukturierten RAG-Pipelines mit vielen heterogenen Quellen." },
      { sym: "vLM", num: 58, name: "vLLM", cat: "TF", row: 4, col: 5, desc: "vLLM ist eine Hochleistungs-Inference-Engine für LLMs, die mit PagedAttention den KV-Cache wie virtuellen Speicher verwaltet. Durch effizientes Memory Management kann vLLM 2-4x mehr gleichzeitige Requests bedienen als naive Implementierungen. Continuous Batching fasst eingehende Requests dynamisch zusammen und maximiert GPU-Auslastung. vLLM ist der De-facto-Standard für Self-Hosted LLM Serving und wird von vielen KI-Startups in Produktion eingesetzt." },
      { sym: "Olm", num: 59, name: "Ollama", cat: "TF", row: 4, col: 6, desc: "Ollama macht lokale LLM-Nutzung so einfach wie Docker-Container: 'ollama run llama3' startet ein Modell in Sekunden. Es verwaltet Modell-Downloads, Quantisierung und eine lokale API automatisch — ideal für Datenschutz, Offline-Nutzung und Experimentieren. Ollama unterstützt alle gängigen Open-Source-Modelle (LLaMA, Mistral, Gemma, Phi) in verschiedenen Quantisierungsstufen. Über eine OpenAI-kompatible API lässt es sich nahtlos in bestehende Anwendungen integrieren." },
      { sym: "MCP", num: 60, name: "Model Context Protocol", cat: "TF", row: 4, col: 7, desc: "Model Context Protocol (MCP) ist Anthropic's offener Standard für die Integration externer Tools und Datenquellen in LLM-Systeme. Wie USB-C für Hardware schafft MCP eine einheitliche Schnittstelle: Jeder MCP-Server (GitHub, Slack, Datenbank) spricht das gleiche Protokoll. Dies ermöglicht LLMs, Werkzeuge zu nutzen, ohne für jede Integration eigenen Code zu schreiben. MCP wird zunehmend zum Industriestandard und wird von Cursor, Replit und vielen anderen Plattformen unterstützt." },
      { sym: "MLf", num: 61, name: "MLflow", cat: "TF", row: 4, col: 10, desc: "MLflow ist eine Open-Source-Plattform für das ML Lifecycle Management von Databricks. Es verwaltet Experiment Tracking (Metriken, Parameter, Artefakte), Model Registry (Versionierung, Staging), und Deployment (Docker, Cloud). Teams können reproduzierbar trainieren, Modelle vergleichen und nahtlos von Experiment zu Produktion übergehen. MLflow hat sich als Standard-Tool in Enterprise-ML-Teams etabliert und integriert mit allen großen Cloud-Providern." },
      { sym: "WnB", num: 62, name: "Weights & Biases", cat: "TF", row: 4, col: 11, desc: "Weights & Biases (W&B) bietet erstklassiges Experiment Tracking mit interaktiven Dashboards und Echtzeit-Visualisierung. Teams tracken Hyperparameter, Metriken, GPU-Nutzung und Modellperformance über Hunderte paralleler Läufe. Sweep-Funktionalität automatisiert Hyperparameter-Optimierung, Artifacts verwalten Datensatz-Versionen. W&B ist zum Standard-Tool für ML-Forschungsteams geworden — fast jedes KI-Paper listet W&B-Plots." },
      { sym: "JAX", num: 63, name: "JAX", cat: "TF", row: 4, col: 12, desc: "JAX kombiniert NumPy-ähnliche Syntax mit Autograd (automatische Differenzierung) und XLA-Compiler für maximale Performance. Google Research und DeepMind nutzen JAX intensiv — Gemini wurde damit trainiert. Funktionale Programmierung ermöglicht einfache Parallelisierung über TPU-Pods mit pmap und vmap. JAX eignet sich besonders für Forschung an neuen Architekturen, wo Flexibilität und Geschwindigkeit gleichzeitig gebraucht werden." },
      { sym: "CrA", num: 64, name: "CrewAI", cat: "TF", row: 4, col: 13, desc: "CrewAI ist ein Python-Framework für die Orchestrierung von Multi-Agent-Systemen mit klaren Rollenverteilungen. Agenten bekommen definierte Rollen (Researcher, Writer, Critic), Tools und Aufgaben zugewiesen und arbeiten kollaborativ zusammen. Die Architektur unterstützt sequenzielle, parallele und hierarchische Workflows zwischen Agenten. CrewAI vereinfacht den Einstieg in Multi-Agent-Systeme und ist besonders populär für Content-Erstellung, Research und Datenanalyse." },
      { sym: "DSp", num: 65, name: "DSPy", cat: "TF", row: 4, col: 14, desc: "DSPy von Stanford ist ein Programmierframework, das LLM-Prompts und Pipelines systematisch optimiert. Statt Prompts manuell zu schreiben, definiert man in DSPy Signaturen (Input→Output) und lässt den Optimizer die besten Prompts finden. Teleprompter-Module optimieren Few-Shot-Beispiele, Chain-of-Thought-Schritte und Prompt-Formulierungen automatisch. DSPy behandelt Prompting als Optimierungsproblem — wissenschaftlicher und reproduzierbarer als manuelles Prompt Engineering." },
      { sym: "A2A", num: 66, name: "A2A Protocol", cat: "TF", row: 4, col: 15, desc: "Agent-to-Agent Protocol (A2A) ist Google's offener Standard, der es KI-Agenten ermöglicht, miteinander zu kommunizieren und Aufgaben zu delegieren. Während MCP die Verbindung zwischen Agent und Tool standardisiert, adressiert A2A die Agent-zu-Agent-Kommunikation. A2A definiert Agent Cards (Fähigkeitsbeschreibungen), Task-Management und sichere Kommunikationsmuster. In Kombination mit MCP entsteht ein vollständiges Interoperabilitäts-Ökosystem für KI-Agenten." },
      { sym: "SmK", num: 67, name: "Semantic Kernel", cat: "TF", row: 4, col: 16, desc: "Semantic Kernel ist Microsoft's Open-Source-Framework für die Orchestrierung von KI-Funktionen in Unternehmensanwendungen. Es verbindet LLMs mit Plugins (Funktionen), Memory (Embeddings/Vektorspeicher) und einem Planner für automatische Aufgabenzerlegung. Semantic Kernel ist besonders stark im Microsoft-Ökosystem (Azure, Office 365, Dynamics) integriert. Die Architektur folgt dem Prinzip 'AI Orchestration Layer' — eine Middleware zwischen LLM und Business-Logik." },
      { sym: "OAI", num: 68, name: "OpenAI API", cat: "TF", row: 4, col: 17, desc: "Die OpenAI API ist die meistgenutzte LLM-API weltweit und bietet Zugang zu GPT-4, DALL-E, Whisper und Embeddings. Die Chat Completions API ist zum De-facto-Standard geworden — viele andere Provider bieten OpenAI-kompatible Endpoints an. Die Assistants API ermöglicht agentic Anwendungen mit Code Interpreter, File Search und Function Calling. Die API-Preise sind zu einem Benchmark für die gesamte Branche geworden und sinken kontinuierlich." },
      { sym: "NLG", num: 69, name: "Text Generation", cat: "AP", row: 5, col: 0, desc: "Text Generation umfasst alle KI-Systeme, die automatisch menschenähnlichen Text erzeugen — von Artikeln über Code bis zu kreativen Texten. LLMs generieren Token für Token autoregressiv, wobei jedes neue Token auf allen bisherigen basiert. Techniken wie Temperature, Top-p Sampling und Frequency Penalty steuern Kreativität und Kohärenz. Textgenerierung ist heute in fast jeder Branche angekommen: Marketing, Journalismus, Kundenservice, Softwareentwicklung." },
      { sym: "ImG", num: 70, name: "Image Generation", cat: "AP", row: 5, col: 1, desc: "KI-Bildgenerierung hat sich seit 2022 von einer Forschungskuriosität zum Massenphänomen entwickelt. DALL-E 3, Midjourney, Stable Diffusion und Flux erzeugen aus Textbeschreibungen fotorealistische Bilder oder kunstvolle Illustrationen. Die Technologie basiert auf Diffusion Models und wird für Werbung, Produktdesign, Concept Art und Content Creation eingesetzt. Ethische Debatten um Urheberrecht, Deepfakes und Künstler-Verdrängung begleiten diese Revolution." },
      { sym: "TTS", num: 71, name: "Text-to-Speech", cat: "AP", row: 5, col: 2, desc: "Text-to-Speech-Systeme wandeln geschriebenen Text in natürlich klingende Sprache um — kaum noch von menschlichen Stimmen zu unterscheiden. ElevenLabs ermöglicht Voice Cloning mit Sekunden an Audiomaterial, OpenAI TTS bietet mehrere realistische Stimmen. Bark und Coqui sind Open-Source-Alternativen mit guter Qualität. TTS wird eingesetzt für Hörbücher, Podcasts, Accessibility, Voice Assistants und Content-Lokalisierung in dutzende Sprachen." },
      { sym: "STT", num: 72, name: "Speech-to-Text", cat: "AP", row: 5, col: 3, desc: "Speech-to-Text (ASR — Automatic Speech Recognition) transkribiert gesprochene Sprache in Text. OpenAI's Whisper setzte 2022 neue Maßstäbe: Multilingual, robust gegen Hintergrundgeräusche und als Open-Source frei verfügbar. Moderne ASR-Systeme nutzen Transformer-Architekturen und erreichen nahezu menschliche Genauigkeit bei klarer Sprache. Anwendungen reichen von Meeting-Transkription über Untertitel-Generierung bis zu Voice-Interfaces und Accessibility-Tools." },
      { sym: "CpV", num: 73, name: "Computer Vision", cat: "AP", row: 5, col: 4, desc: "Computer Vision umfasst alle KI-Systeme, die visuelle Informationen verstehen und verarbeiten — Bilderkennung, Objektdetektion, Segmentierung, Pose Estimation. Vision Transformer (ViT) und YOLO sind aktuelle Standardarchitekturen. Multimodale LLMs (GPT-4V, Claude Vision) haben die Grenzen zwischen CV und NLP aufgelöst — sie 'sehen' und 'verstehen' Bilder gleichzeitig. Einsatzgebiete: Qualitätskontrolle, Medizinische Bildgebung, Autonomes Fahren, Augmented Reality." },
      { sym: "VdG", num: 74, name: "Video Generation", cat: "AP", row: 5, col: 5, desc: "KI-Videogenerierung ist die neueste Frontier der generativen KI — die Erzeugung kohärenter Videos aus Textbeschreibungen. Sora (OpenAI), Runway Gen-3, Kling und Pika erzeugen zunehmend realistische Clips von mehreren Sekunden bis Minuten. Die Technologie nutzt Video Diffusion Models und kämpft noch mit physikalischer Konsistenz und Temporaler Kohärenz. Einsatzgebiete entstehen in Werbung, Film-Previsualisierung, Social Media Content und Prototyping." },
      { sym: "CdG", num: 75, name: "Code Generation", cat: "AP", row: 5, col: 6, desc: "KI-gestützte Code-Generierung hat die Softwareentwicklung fundamental verändert. GitHub Copilot, Cursor, Claude Code und Codex erzeugen Code aus natürlichsprachlichen Beschreibungen und Kontext. Studien zeigen Produktivitätssteigerungen von 30-55% bei Entwicklern. Die Debatte um Code-Qualität, Sicherheitslücken und die Zukunft des Entwicklerberufs ist in vollem Gange — klar ist: Jeder Entwickler wird zukünftig mit KI-Tools arbeiten." },
      { sym: "RoB", num: 76, name: "Robotik", cat: "AP", row: 5, col: 7, desc: "KI-gesteuerte Robotik verbindet Foundation Models mit physischer Interaktion in der realen Welt (Embodied AI). Manipulation (Greifen, Montieren), Navigation (autonome Fortbewegung), und Multi-Robot-Koordination sind Kernherausforderungen. Google's RT-2 und Figure 01 nutzen Vision-Language-Models für Robotersteuerung aus natürlicher Sprache. Die nächste Welle humanoider Roboter (Tesla Optimus, Figure, 1X) soll Foundation Models für allgemeine physische Aufgaben nutzen." },
      { sym: "ViC", num: 77, name: "Vibe Coding", cat: "AP", row: 5, col: 10, desc: "Vibe Coding beschreibt den Paradigmenwechsel: Softwareentwicklung durch natürlichsprachliche Beschreibung statt manuelles Programmieren. Man beschreibt einem KI-Tool (Cursor, Replit Agent, Claude Code, v0) was die App tun soll — die KI schreibt den gesamten Code. Dieser Ansatz demokratisiert Softwareentwicklung für Nicht-Programmierer und beschleunigt Prototyping enorm. Die Qualität des Ergebnisses hängt stark von der Prompt-Qualität und dem verwendeten Framework ab." },
      { sym: "DrA", num: 78, name: "Drug Discovery", cat: "AP", row: 5, col: 11, desc: "KI revolutioniert die Medikamentenentwicklung: Von der Zielidentifikation über Moleküldesign bis zu klinischen Studien. AlphaFold löste 2020 das 50 Jahre alte Protein-Faltungsproblem und erhielt 2024 den Nobelpreis für Chemie. Generative Modelle designen neue Moleküle mit gewünschten Eigenschaften, ML-Modelle sagen Toxizität und Wirksamkeit vorher. KI kann den typischen 10-15-Jahres-Zyklus der Medikamentenentwicklung potenziell auf 2-3 Jahre verkürzen." },
      { sym: "AvD", num: 79, name: "Autonomous Driving", cat: "AP", row: 5, col: 12, desc: "Autonomes Fahren verbindet Computer Vision, Sensor Fusion (Kamera, Lidar, Radar), Pfadplanung und Kontrollsysteme. Tesla setzt auf einen kamerabasierten End-to-End-Ansatz mit neuronalen Netzen, Waymo nutzt Lidar-basierte modulare Systeme. Level 4 Autonomie (fahrerloses Taxi) ist in begrenzten Gebieten bereits Realität (Waymo in Phoenix/SF). Die vollständige Level-5-Autonomie (überall, alle Bedingungen) bleibt eine der größten offenen KI-Herausforderungen." },
      { sym: "ReS", num: 80, name: "Recommender Systems", cat: "AP", row: 5, col: 13, desc: "Empfehlungssysteme sind eine der ältesten und wirtschaftlich bedeutsamsten KI-Anwendungen. Collaborative Filtering empfiehlt basierend auf ähnlichen Nutzern, Content-based basierend auf Item-Eigenschaften, Hybrid kombiniert beides. Netflix, Spotify, Amazon und TikTok generieren Milliardenumsätze durch personalisierte Empfehlungen. Moderne Recommender nutzen Deep Learning, Transformer-Architekturen und zunehmend LLMs für konversationsbasierte Empfehlungen." },
      { sym: "SeA", num: 81, name: "Sentiment Analysis", cat: "AP", row: 5, col: 14, desc: "Sentiment Analysis erkennt automatisch die emotionale Stimmung in Texten — positiv, negativ, neutral, oder feiner granuliert. Anwendungen reichen von Brand Monitoring (Was sagen Kunden auf Social Media?) über Finanzanalyse (Marktstimmung aus Nachrichten) bis zu Kundenservice-Triage. Vortrainierte Transformer-Modelle erreichen >90% Accuracy bei Standard-Sentiment-Aufgaben. Die Herausforderung liegt in Sarkasmus, Ironie, kulturellem Kontext und aspektbasiertem Sentiment." },
      { sym: "3DG", num: 82, name: "3D Generation", cat: "AP", row: 5, col: 15, desc: "3D-Generierung aus Text oder einzelnen Bildern ist eines der heißesten Forschungsgebiete der generativen KI. NeRF (Neural Radiance Fields) lernt 3D-Szenen aus 2D-Fotos, Gaussian Splatting bietet schnellere Rendering-Alternative. Tools wie Meshy, Tripo und Luma generieren 3D-Assets für Games, AR/VR und Produktvisualisierung. Die Qualität nähert sich produktionstauglichem Niveau, was 3D-Content-Erstellung radikal demokratisieren könnte." },
      { sym: "MuG", num: 83, name: "Music Generation", cat: "AP", row: 5, col: 16, desc: "KI-Musikgenerierung erzeugt vollständige Songs inklusive Gesang, Instrumentierung und Mastering aus Textbeschreibungen. Suno und Udio können in Minuten professionell klingende Tracks in jedem Genre erstellen. Die Technologie nutzt Transformer- und Diffusion-Modelle, trainiert auf Millionen von Songs. Die Musik- und Urheberrechtsdebatte ist intensiv — Künstler und Labels kämpfen mit der Disruption ihrer Geschäftsmodelle." },
      { sym: "SrC", num: 84, name: "AI Search", cat: "AP", row: 5, col: 17, desc: "KI-gestützte Suche ersetzt zunehmend klassische Keyword-Suche durch konversationsbasierte Antwortgenerierung. Perplexity liefert quellenbasierte Antworten statt Links, Google AI Overview fasst Suchergebnisse zusammen, Bing Chat integriert GPT in die Suche. Dieser Paradigmenwechsel bedroht das klassische Suchmaschinen-Geschäftsmodell (Klicks auf Links → Werbung). Für Nutzer bedeutet es schnellere, direktere Antworten — für Content-Creator weniger organischen Traffic." },
      { sym: "AlI", num: 85, name: "Alignment", cat: "ES", row: 6, col: 0, desc: "AI Alignment ist das fundamentale Problem, KI-Systeme so zu entwickeln, dass ihre Ziele mit menschlichen Werten und Intentionen übereinstimmen. Constitutional AI (Anthropic), RLHF (OpenAI) und DPO sind aktuelle Alignment-Techniken. Das Problem wird existenzieller je mächtiger Modelle werden: Ein superintelligentes, nicht-aligniertes System wäre ein enormes Risiko. Die Alignment-Forschung beschäftigt sich mit Reward Hacking, Goal Misgeneralization und Scalable Oversight." },
      { sym: "XAI", num: 86, name: "Explainability", cat: "ES", row: 6, col: 1, desc: "Explainable AI (XAI) macht KI-Entscheidungen für Menschen nachvollziehbar und überprüfbar. SHAP-Werte zeigen, welche Features eine Entscheidung beeinflusst haben, LIME erklärt lokale Vorhersagen, Attention Maps visualisieren, worauf ein Modell achtet. XAI ist regulatorisch zunehmend gefordert (EU AI Act) und ethisch geboten, besonders bei Kredit-Scoring, medizinischer Diagnostik und Justiz. Die Herausforderung: Deep Learning Modelle sind inherent schwer zu erklären — Interpretierbarkeit und Performance stehen oft in Spannung." },
      { sym: "BiF", num: 87, name: "Bias & Fairness", cat: "ES", row: 6, col: 2, desc: "Bias in KI-Systemen reproduziert und verstärkt gesellschaftliche Vorurteile aus den Trainingsdaten. Sprachmodelle können Gender-Stereotypen wiedergeben, Gesichtserkennung funktioniert bei dunkler Hautfarbe schlechter, Bewerbungsfilter benachteiligen bestimmte Gruppen. Fairness-Metriken (Demographic Parity, Equalized Odds) und Audit-Frameworks helfen, Bias zu messen und zu reduzieren. Völlige Bias-Freiheit ist unmöglich — die Frage ist, welche Tradeoffs gesellschaftlich akzeptabel sind." },
      { sym: "PrI", num: 88, name: "Privacy", cat: "ES", row: 6, col: 3, desc: "Privacy in KI umfasst den Schutz personenbezogener Daten in Training, Inferenz und Deployment. Differential Privacy fügt mathematisch kontrolliertes Rauschen hinzu, um individuelle Datenpunkte unrekonstruierbar zu machen. Membership Inference Attacks können testen, ob bestimmte Daten im Training waren — ein Risiko für sensible Daten. DSGVO, CCPA und der EU AI Act stellen strenge Anforderungen an KI-Systeme, die personenbezogene Daten verarbeiten." },
      { sym: "RdT", num: 89, name: "Red Teaming", cat: "ES", row: 6, col: 4, desc: "Red Teaming bezeichnet das systematische, adversariale Testen von KI-Systemen auf Schwachstellen und Missbrauchspotenzial. Spezialisierte Teams versuchen, Modelle zu Jailbreaks zu bewegen, Prompt Injection durchzuführen, toxische Outputs zu provozieren oder Sicherheitsfilter zu umgehen. Anthropic, OpenAI und Google führen vor jedem Release umfangreiche Red-Teaming-Kampagnen durch. Externe Bug Bounty Programme und akademische Red-Teaming-Wettbewerbe ergänzen die internen Bemühungen." },
      { sym: "GuR", num: 90, name: "Guardrails", cat: "ES", row: 6, col: 5, desc: "Guardrails sind Sicherheitsschichten, die zwischen Nutzereingabe und Modellausgabe geschaltet werden. Input-Guardrails filtern gefährliche Prompts (Prompt Injection, toxische Anfragen), Output-Guardrails validieren Antworten (Faktencheck, Toxizität, PII-Erkennung). Frameworks wie NeMo Guardrails (NVIDIA), Guardrails AI und LlamaGuard bieten konfigurierbare Safety-Layer. Guardrails sind essenziell für Enterprise-Deployment, wo unkontrollierte Modellausgaben Haftungsrisiken bergen." },
      { sym: "HaL", num: 91, name: "Halluzinationen", cat: "ES", row: 6, col: 6, desc: "Halluzinationen sind ein Kernproblem von LLMs: Das Modell generiert plausibel klingende, aber faktisch falsche Informationen. Die Ursache liegt in der statistischen Natur der Textgenerierung — das Modell maximiert Wahrscheinlichkeit, nicht Wahrheit. Gegenmaßnahmen umfassen RAG (externes Wissen einbinden), Chain-of-Verification (Selbstüberprüfung), Grounding (Quellenangaben) und spezielle Trainingsdaten. Halluzinationen vollständig zu eliminieren bleibt eine offene Herausforderung." },
      { sym: "EuA", num: 92, name: "EU AI Act", cat: "ES", row: 6, col: 7, desc: "Der EU AI Act ist das weltweit erste umfassende KI-Gesetz und trat stufenweise ab 2024 in Kraft. Er kategorisiert KI-Systeme in Risikoklassen: Minimal (Spam-Filter), Begrenzt (Chatbots), Hoch (Kredit-Scoring, Medizin) und Unakzeptabel (Social Scoring). Hochrisiko-Systeme müssen strenge Anforderungen an Transparenz, Datenqualität, menschliche Aufsicht und Risikomanagement erfüllen. Der Act beeinflusst KI-Entwicklung weltweit — ähnlich wie die DSGVO zum globalen Datenschutz-Standard wurde." },
      { sym: "AgW", num: 93, name: "Agentic Workflows", cat: "AG", row: 6, col: 10, desc: "Agentic Workflows beschreiben KI-Systeme, die autonom planen, handeln, beobachten und ihren Ansatz anpassen. Statt einmaliger Prompt→Antwort-Interaktion durchlaufen Agenten iterative Loops: Aufgabe analysieren, Plan erstellen, Tools nutzen, Ergebnis prüfen, nachbessern. Frameworks wie LangGraph, CrewAI und AutoGen orchestrieren solche Workflows. 2024/2025 markiert den Übergang von Chatbots zu echten KI-Agenten, die komplexe Aufgaben eigenständig über Stunden bearbeiten." },
      { sym: "ToU", num: 94, name: "Tool Use", cat: "AG", row: 6, col: 11, desc: "Tool Use ermöglicht LLMs, über Textgenerierung hinaus mit der Außenwelt zu interagieren. Modelle können APIs aufrufen, Code ausführen, Datenbanken abfragen, Webseiten lesen und Dateien bearbeiten. Function Calling (OpenAI), Tool Use (Anthropic) und MCP standardisieren die Tool-Integration. Tool Use ist die Grundlage für KI-Agenten — ohne Werkzeuge bleibt ein LLM auf sein Trainingswissen beschränkt." },
      { sym: "MAS", num: 95, name: "Multi-Agent Systems", cat: "AG", row: 6, col: 12, desc: "Multi-Agent-Systeme koordinieren mehrere spezialisierte KI-Agenten, die gemeinsam komplexe Aufgaben lösen. Ein Researcher-Agent sammelt Informationen, ein Writer formuliert Texte, ein Critic überprüft die Qualität — jeder Agent hat eigene Fähigkeiten und Tools. Die Herausforderung liegt in Kommunikation, Aufgabenverteilung, Konfliktlösung und Fehlerbehandlung zwischen Agenten. Multi-Agent-Architekturen skalieren besser als monolithische Agenten für komplexe, mehrstufige Aufgaben." },
      { sym: "PrE", num: 96, name: "Prompt Engineering", cat: "AG", row: 6, col: 13, desc: "Prompt Engineering ist die Kunst und Wissenschaft, optimale Anweisungen für LLMs zu formulieren. System Prompts definieren Verhalten und Persona, Few-Shot-Beispiele zeigen gewünschte Muster, Chain-of-Thought aktiviert Reasoning. Techniken wie Role Prompting, Step-Back Prompting und Structured Output Prompting können die Qualität der Antworten drastisch verbessern. Prompt Engineering wird zunehmend durch automatisierte Methoden (DSPy) ergänzt, bleibt aber als menschliche Fähigkeit wertvoll." },
      { sym: "MeM", num: 97, name: "Memory Systems", cat: "AG", row: 6, col: 14, desc: "Memory Systems geben KI-Agenten die Fähigkeit, sich an vergangene Interaktionen und Erkenntnisse zu erinnern. Short-Term Memory nutzt das Kontextfenster, Long-Term Memory speichert Zusammenfassungen in Vektordatenbanken oder Key-Value-Stores. MemGPT verwaltet Memory hierarchisch analog zu OS-Speicher-Management (RAM vs. Disk). Effektive Memory-Systeme sind entscheidend für personalisierte Assistenten und Agenten, die über Wochen an Projekten arbeiten." },
      { sym: "PlN", num: 98, name: "Planning & Reasoning", cat: "AG", row: 6, col: 15, desc: "Planning & Reasoning befähigt KI-Agenten, komplexe Aufgaben in Teilschritte zu zerlegen und strategisch vorzugehen. ReAct (Reason + Act) alterniert zwischen Denken und Handeln, Tree-of-Thought exploriert multiple Lösungspfade parallel. Task Decomposition bricht große Ziele in handhabbare Sub-Tasks herunter. Die Reasoning-Fähigkeit von LLMs (besonders o1/o3 und Claude) hat sich 2024/2025 dramatisch verbessert und ermöglicht zunehmend autonome Problemlösung." },
      { sym: "CdI", num: 99, name: "Code Interpreter", cat: "AG", row: 6, col: 16, desc: "Code Interpreter ermöglicht LLMs, Python-Code in einer isolierten Sandbox auszuführen und Ergebnisse zu analysieren. Datenanalyse, mathematische Berechnungen, Diagramm-Erstellung und Dateitransformation werden durch Code-Ausführung präzise statt approximativ. OpenAI's Code Interpreter, Claude's Computer Use und Google's Code Execution bieten diese Fähigkeit. Die Sandbox-Umgebung stellt sicher, dass ausgeführter Code keinen Zugriff auf sensible Systeme hat." },
      { sym: "OcH", num: 100, name: "Orchestrierung", cat: "AG", row: 6, col: 17, desc: "Orchestrierung koordiniert das Zusammenspiel multipler KI-Komponenten — LLMs, Tools, Datenquellen und Agenten — in komplexen Workflows. DAGs (Directed Acyclic Graphs) definieren Abhängigkeiten, Retry-Logik und Parallelisierung. LangGraph, Prefect, Temporal und Apache Airflow sind gängige Orchestrierungs-Tools. In Enterprise-Szenarien verbindet die Orchestrierungsschicht Dutzende von Microservices, APIs und ML-Modellen zu robusten End-to-End-Pipelines." },
      { sym: "GPU", num: 101, name: "GPU Computing", cat: "IN", row: 7, col: 0, desc: "GPUs (Graphics Processing Units) sind die Arbeitspferde des KI-Trainings — ihre massiv-parallele Architektur ist ideal für Matrixmultiplikation. NVIDIA dominiert mit H100, H200 und B200 den KI-GPU-Markt mit geschätzt 80-90% Marktanteil. Ein einzelnes GPT-4-Training verbraucht geschätzt 25.000+ A100-GPUs über Monate — die Kosten liegen im dreistelligen Millionenbereich. GPU-Knappheit und Energieverbrauch sind zentrale Engpässe der KI-Entwicklung." },
      { sym: "TPU", num: 102, name: "TPU", cat: "IN", row: 7, col: 1, desc: "Tensor Processing Units sind Google's maßgeschneiderte KI-Chips, optimiert für TensorFlow und JAX-Workloads. TPU-Pods verbinden Tausende Chips über Hochgeschwindigkeitsnetzwerke für verteiltes Training. Google nutzt TPUs intern für das Training von Gemini, PaLM und anderen Modellen. TPU v5p erreicht 459 TFLOPS bei BF16 — vergleichbar mit NVIDIA H100, aber nur über Google Cloud verfügbar." },
      { sym: "ClC", num: 103, name: "Cloud ML", cat: "IN", row: 7, col: 2, desc: "Cloud ML Services bieten ML-Infrastruktur, -Tools und -APIs als Managed Service. AWS SageMaker, Azure ML und GCP Vertex AI decken den gesamten ML-Lifecycle ab: Training, Hosting, Monitoring. Für LLMs bieten alle drei Clouds API-Zugang zu Foundation Models (Bedrock, Azure OpenAI, Model Garden). Cloud ML demokratisiert KI-Zugang — Teams ohne eigene GPU-Cluster können dennoch state-of-the-art Modelle trainieren und deployen." },
      { sym: "EdG", num: 104, name: "Edge AI", cat: "IN", row: 7, col: 3, desc: "Edge AI bringt KI-Inferenz direkt auf Endgeräte — Smartphones, IoT-Sensoren, Kameras, Autos — ohne Cloud-Verbindung. TensorFlow Lite, ONNX Runtime, Core ML und OpenVINO optimieren Modelle für ressourcenbeschränkte Hardware. Apple's Neural Engine, Google's Edge TPU und Qualcomm's Hexagon sind spezialisierte KI-Chips für mobile Geräte. Edge AI bietet niedrige Latenz, Datenschutz (Daten verlassen das Gerät nie) und Offline-Fähigkeit." },
      { sym: "CoN", num: 105, name: "Containerisierung", cat: "IN", row: 7, col: 4, desc: "Containerisierung mit Docker und Kubernetes hat die Reproduzierbarkeit und Skalierbarkeit von ML-Workflows revolutioniert. Docker-Container kapseln Modelle mit allen Abhängigkeiten, Kubernetes orchestriert GPU-Cluster für Training und Serving. NVIDIA Container Toolkit integriert GPU-Zugriff in Container, MLflow und Kubeflow bieten ML-spezifische Kubernetes-Erweiterungen. In Produktionsumgebungen sind containerisierte ML-Pipelines der Standard für zuverlässiges Deployment." },
      { sym: "ScL", num: 106, name: "Scaling Laws", cat: "IN", row: 7, col: 5, desc: "Scaling Laws beschreiben die mathematischen Beziehungen zwischen Modellgröße, Datenmenge, Rechenaufwand und Modellperformance. Kaplan et al. (OpenAI, 2020) zeigten Power-Law-Zusammenhänge; Chinchilla (DeepMind, 2022) bewies, dass viele Modelle zu groß und zu wenig trainiert waren. Die Gesetze besagen: Verdopple die Compute → halte das Compute-zu-Daten-Verhältnis optimal → vorhersagbare Performance-Steigerung. Scaling Laws sind die theoretische Grundlage für die Investitionsentscheidungen der KI-Labore." },
      { sym: "MoS", num: 107, name: "Model Serving", cat: "IN", row: 7, col: 6, desc: "Model Serving bezeichnet die Bereitstellung trainierter Modelle für Echtzeit-Inferenz in Produktionsumgebungen. NVIDIA Triton Inference Server, Hugging Face TGI (Text Generation Inference) und vLLM sind führende Serving-Frameworks. Continuous Batching, Speculative Decoding und Tensor Parallelism maximieren Throughput bei minimaler Latenz. Autoscaling, Health Monitoring und A/B-Testing sind essenziell für zuverlässiges Production Serving." },
      { sym: "CUd", num: 108, name: "CUDA", cat: "IN", row: 7, col: 7, desc: "CUDA ist NVIDIA's paralleles Programmiermodell und die fundamentale Software-Schicht, auf der praktisch alles moderne ML basiert. Über CUDA sprechen Frameworks wie PyTorch und TensorFlow mit NVIDIA-GPUs; cuBLAS, cuDNN und NCCL sind optimierte Bibliotheken für ML-Operationen. NVIDIA's CUDA-Ökosystem ist der tiefste Moat im KI-Hardware-Markt — ein Grund, warum Wettbewerber (AMD, Intel) trotz guter Hardware Marktanteile nur langsam gewinnen. ROCm (AMD) und oneAPI (Intel) versuchen als Alternativen Fuß zu fassen." },
      { sym: "NER", num: 109, name: "Named Entity Rec.", cat: "NL", row: 7, col: 10, desc: "Named Entity Recognition identifiziert und klassifiziert benannte Entitäten in Text: Personen, Orte, Organisationen, Daten, Geldbeträge. Moderne NER nutzt Transformer-basierte Modelle (BERT, RoBERTa) und erreicht F1-Scores über 90% für Standarddomänen. NER ist ein Baustein für Information Extraction, Wissensgraph-Aufbau und Dokumentenverarbeitung. Spezialisierte NER-Modelle für Medizin (BioNER), Recht und Finanzen adressieren domänenspezifische Entitätstypen." },
      { sym: "SuM", num: 110, name: "Summarization", cat: "NL", row: 7, col: 11, desc: "Automatische Zusammenfassung komprimiert lange Texte auf die wesentlichen Informationen. Extractive Summarization wählt die wichtigsten Sätze aus, Abstractive Summarization formuliert neue, kürzere Zusammenfassungen. LLMs haben die Qualität von Abstractive Summarization revolutioniert — sie erfassen Kontext und formulieren natürlich um. Anwendungen: Nachrichten-Zusammenfassungen, Meeting Minutes, Forschungspaper-Abstracts, Dokumentenreviews." },
      { sym: "TrN", num: 111, name: "Translation", cat: "NL", row: 7, col: 12, desc: "Maschinelle Übersetzung hat durch Transformer-Modelle Qualitätsniveaus erreicht, die menschliche Übersetzer für viele Textsorten ersetzen. Neural Machine Translation (NMT) Modelle lernen End-to-End aus parallelen Textkorpora. LLMs ermöglichen Zero-Shot-Übersetzung in Sprachen, für die wenig Trainingsdaten existieren. Google Translate, DeepL und Meta's NLLB (No Language Left Behind) übersetzen zwischen hunderten Sprachpaaren mit zunehmend professioneller Qualität." },
      { sym: "QnA", num: 112, name: "Question Answering", cat: "NL", row: 7, col: 13, desc: "Question Answering Systeme beantworten natürlichsprachliche Fragen automatisch aus strukturierten oder unstrukturierten Datenquellen. Open-Domain QA beantwortet beliebige Faktenfragen, Closed-Book QA aus dem Modellwissen, Open-Book QA mit Zugriff auf Dokumente (RAG). Extractive QA markiert die Antwort im Quelltext, Generative QA formuliert sie frei. LLMs haben QA demokratisiert — jeder Chatbot ist im Kern ein QA-System." },
      { sym: "ClS", num: 113, name: "Classification", cat: "NL", row: 7, col: 14, desc: "Textklassifikation ordnet Texte automatisch vordefinierten Kategorien zu — eine der grundlegendsten NLP-Aufgaben. Spam-Erkennung, Themen-Zuordnung, Intent-Erkennung in Chatbots, Toxizitätserkennung und Content Moderation sind typische Anwendungen. BERT-basierte Modelle und Fine-Tuned LLMs erreichen >95% Accuracy bei vielen Benchmark-Aufgaben. Zero-Shot-Klassifikation mit LLMs ermöglicht Kategorisierung ohne jedes Trainingsbeispiel." },
      { sym: "ToM", num: 114, name: "Topic Modeling", cat: "NL", row: 7, col: 15, desc: "Topic Modeling extrahiert automatisch thematische Strukturen aus großen Textsammlungen. Klassische Methoden wie LDA (Latent Dirichlet Allocation) wurden durch BERTopic revolutioniert, das Sentence Embeddings mit Clustering kombiniert. Die Ergebnisse zeigen, welche Themen in einem Korpus vorkommen, wie sie sich über Zeit verändern und welche Dokumente zusammengehören. Anwendungen: Marktforschung, Social Media Monitoring, Literaturanalyse, Content-Strategie." },
      { sym: "InE", num: 115, name: "Info Extraction", cat: "NL", row: 7, col: 16, desc: "Information Extraction gewinnt strukturierte Daten aus unstrukturiertem Fließtext — Fakten, Relationen, Events und Attribute. Relation Extraction erkennt Zusammenhänge ('Firma X übernahm Firma Y'), Event Extraction identifiziert Ereignisse mit Akteuren und Zeitpunkten. LLMs können als universelle Extraktoren fungieren, die mit Prompt-Anweisungen beliebige Informationsstrukturen aus Texten herausziehen. IE ist fundamental für Wissensgraph-Aufbau, Dokumentenverarbeitung und Business Intelligence." },
      { sym: "DlG", num: 116, name: "Dialogue Systems", cat: "NL", row: 7, col: 17, desc: "Dialogue Systems umfassen alle KI-Systeme für natürlichsprachliche Konversation. Task-Oriented Systems lösen spezifische Aufgaben (Hotel buchen, Flug suchen), Open-Domain Chatbots führen freie Gespräche. LLMs haben beide Kategorien vereinheitlicht — ein Modell kann beides. Die Herausforderungen liegen in Kohärenz über lange Gespräche, Personalisierung, Erkennung von Konversationsabbrüchen und emotionaler Intelligenz." },
      { sym: "SD", num: 117, name: "Stable Diffusion", cat: "FM", row: 9, col: 3, desc: "Stable Diffusion ist das wichtigste Open-Source-Bildgenerierungsmodell und Basis eines riesigen Community-Ökosystems. Stability AI veröffentlichte es 2022 als Open Source, was eine Explosion von Fine-Tunes, ControlNet, LoRAs und Custom Workflows auslöste. SDXL und SD3 verbesserten Qualität und Textrendering erheblich. ComfyUI und Automatic1111 sind populäre Interfaces, die komplexe generative Pipelines ohne Code ermöglichen." },
      { sym: "MdJ", num: 118, name: "Midjourney", cat: "FM", row: 9, col: 4, desc: "Midjourney produziert die ästhetisch hochwertigsten KI-generierten Bilder und hat eine eigene künstlerische Identität entwickelt. Das Tool läuft über Discord-Bots und neuerdings über eine eigene Web-App. Midjourney's Stärke liegt in der künstlerischen Interpretation von Prompts — Ergebnisse wirken oft wie professionelle Illustrationen oder Konzeptkunst. Besonders populär bei Designern, Concept Artists und Kreativen, die schnell visuelle Ideen explorieren wollen." },
      { sym: "DaE", num: 119, name: "DALL·E", cat: "FM", row: 9, col: 5, desc: "DALL-E ist OpenAI's Bildgenerator, der als erstes System 2021 die Welt auf Text-to-Image-Generierung aufmerksam machte. DALL-E 3 ist tief in ChatGPT integriert und erzeugt direkt aus Konversation heraus Bilder mit bemerkenswerter Texttreue. Die Stärke liegt in der präzisen Umsetzung komplexer Prompts und der nahtlosen Integration in den OpenAI-Workflow. Inpainting und Outpainting ermöglichen gezielte Bearbeitung einzelner Bildbereiche." },
      { sym: "Sor", num: 120, name: "Sora", cat: "FM", row: 9, col: 6, desc: "Sora ist OpenAI's Videogenerierungsmodell, das 2024 mit beeindruckend physikalisch kohärenten Demo-Videos für Aufsehen sorgte. Es versteht 3D-Konsistenz, Objektpermanenz und physikalische Interaktionen auf einem bisher unerreichten Niveau. Sora nutzt eine Diffusion-Transformer-Architektur, die Videos als Sequenzen von Patches verarbeitet. Die Veröffentlichung markiert den Beginn einer neuen Ära für Content Creation, Film und Werbung." },
      { sym: "Whi", num: 121, name: "Whisper", cat: "FM", row: 9, col: 7, desc: "Whisper ist OpenAI's Open-Source-Spracherkennungsmodell, das über 100 Sprachen versteht und transkribiert. Trainiert auf 680.000 Stunden multilingualer Audio-Daten, erreicht Whisper bemerkenswerte Robustheit gegenüber Akzenten, Hintergrundgeräuschen und Fachsprache. Die Open-Source-Verfügbarkeit hat es zum Standard für Transkription, Untertitel und Voice-Interfaces gemacht. Whisper large-v3 erreicht für viele Sprachen nahezu menschliche Transkriptionsqualität." },
      { sym: "AlF", num: 122, name: "AlphaFold", cat: "FM", row: 9, col: 8, desc: "AlphaFold von DeepMind löste 2020 eines der größten offenen Probleme der Biologie: die Vorhersage der 3D-Struktur von Proteinen aus ihrer Aminosäuresequenz. AlphaFold2 erreichte experimentelle Genauigkeit und prognostizierte die Struktur von über 200 Millionen Proteinen — praktisch aller bekannten Proteine. Demis Hassabis und John Jumper erhielten dafür 2024 den Nobelpreis für Chemie. AlphaFold3 erweitert die Vorhersage auf Protein-DNA-, Protein-RNA- und Protein-Ligand-Interaktionen." },
      { sym: "BRT", num: 123, name: "BERT", cat: "FM", row: 9, col: 9, desc: "BERT (Bidirectional Encoder Representations from Transformers) war 2018 Google's Durchbruch für Natural Language Understanding. Im Gegensatz zu GPT (nur vorwärts) lernt BERT bidirektional — es versteht Kontext von beiden Seiten eines Wortes gleichzeitig. Masked Language Modeling (zufällige Wörter verdecken und vorhersagen) und Next Sentence Prediction sind die Trainingsaufgaben. BERT revolutionierte NLP-Benchmarks und ist noch heute Basis vieler produktiver Systeme für Klassifikation, NER und Suche." },
      { sym: "CLp", num: 124, name: "CLIP", cat: "FM", row: 9, col: 10, desc: "CLIP (Contrastive Language-Image Pre-training) von OpenAI verbindet Bild- und Textverständnis in einem gemeinsamen Embedding-Raum. Trainiert auf 400 Millionen Bild-Text-Paaren aus dem Internet, kann CLIP Bilder in beliebige Kategorien klassifizieren, ohne je dafür trainiert worden zu sein. CLIP ist ein Schlüsselbaustein für Diffusion-basierte Bildgenerierung (Stable Diffusion, DALL-E) und multimodale Suche. Die Architektur inspirierte eine ganze Generation multimodaler Modelle." },
      { sym: "DpS", num: 125, name: "DeepSeek", cat: "FM", row: 9, col: 11, desc: "DeepSeek aus China hat 2024/2025 die KI-Welt überrascht: Trotz US-Chipsanktionen erreichen ihre Modelle westliches Spitzenniveau bei deutlich weniger Training-Compute. DeepSeek-V3 nutzt innovative Mixture-of-Experts-Architektur und wurde zu einem Bruchteil der Kosten vergleichbarer Modelle trainiert. Die Open-Source-Veröffentlichung löste eine Diskussion über die Effektivität von Exportkontrollen und die Innovationsfähigkeit chinesischer KI-Labore aus. DeepSeek-R1 demonstriert zudem starke Reasoning-Fähigkeiten." },
      { sym: "Phi", num: 126, name: "Phi", cat: "FM", row: 9, col: 12, desc: "Phi ist Microsoft's Familie kleiner, aber überraschend leistungsstarker Sprachmodelle (Small Language Models / SLMs). Phi-3 mit 3.8B Parametern erreicht Ergebnisse, die viel größere Modelle herausfordern — durch sorgfältige Datenselektion und synthetisches Training. Die Modelle sind optimiert für Edge Deployment: Smartphones, Laptops, IoT-Devices. Microsoft's Thesis: Datenqualität kann Modellgröße teilweise kompensieren — weniger Parameter, besser kuratierte Daten." },
      { sym: "Flx", num: 127, name: "Flux", cat: "FM", row: 9, col: 13, desc: "Flux von Black Forest Labs (gegründet von Ex-Stability-AI-Forschern) ist ein schneller, hochqualitativer Open-Source-Bildgenerator. Flux.1 Pro, Dev und Schnell adressieren verschiedene Qualitäts-/Geschwindigkeits-Tradeoffs. Die Bildqualität konkurriert mit Midjourney und DALL-E 3, bei voller Open-Source-Verfügbarkeit. Flux hat sich als beliebte Stable-Diffusion-Alternative für lokale und API-basierte Bildgenerierung etabliert." },
      { sym: "Qwn", num: 128, name: "Qwen", cat: "FM", row: 9, col: 14, desc: "Qwen ist Alibaba Cloud's multimodale, multilinguale Open-Source LLM-Familie mit bemerkenswert breiter Fähigkeitspalette. Qwen2.5 bietet Modelle von 0.5B bis 72B Parametern, plus spezialisierte Varianten für Code (Qwen-Coder), Mathematik und Vision. Besonders stark in Chinesisch und Englisch, mit guter Unterstützung für weitere Sprachen. Qwen demonstriert, dass das chinesische KI-Ökosystem vollwertige Alternativen zu westlichen Foundation Models hervorbringt." },
    ];

    const TOTAL_COLS = 18;
    const catEntries = Object.entries(CATEGORIES);

    /* ═══════════════════════ CELL ═══════════════════════ */

    function Cell({ el, selected, setSelected, hoveredCat }) {
      const cat = CATEGORIES[el.cat];
      const isSelected = selected?.num === el.num;
      const dimmed = hoveredCat && hoveredCat !== el.cat;
      const [hovered, setHovered] = useState(false);
      const active = isSelected || (hovered && !dimmed);

      return (
        <div
          onClick={() => setSelected(isSelected ? null : el)}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          role="button"
          tabIndex={0}
          aria-label={`${el.sym} – ${el.name}`}
          onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setSelected(isSelected ? null : el); }}}
          style={{
            aspectRatio: "1",
            background: active ? cat.light : "#fff",
            border: `1.5px solid ${active ? cat.color : "#e8e8e3"}`,
            borderLeft: `3px solid ${active ? cat.color : dimmed ? "#e8e8e3" : cat.color + "50"}`,
            borderRadius: 4,
            display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            cursor: "pointer",
            transition: "all 0.2s ease",
            opacity: dimmed ? 0.1 : 1,
            position: "relative",
            padding: 2,
            transform: active ? "scale(1.1)" : "scale(1)",
            zIndex: active ? 10 : 1,
            boxShadow: active ? `0 3px 16px ${cat.color}20` : "0 1px 2px rgba(0,0,0,0.03)",
            outline: "none",
          }}
        >
          <span style={{
            position: "absolute", top: 2, right: 3,
            fontSize: "clamp(4px, 0.6vw, 7px)", color: "#ccc",
            fontFamily: "'DM Mono', monospace", fontWeight: 500,
          }}>{el.num}</span>
          <span style={{
            fontSize: "clamp(10px, 1.5vw, 17px)", fontWeight: 700,
            color: cat.color, lineHeight: 1, letterSpacing: "-0.02em",
          }}>{el.sym}</span>
          <span style={{
            fontSize: "clamp(3px, 0.48vw, 5.5px)",
            color: "#999", textAlign: "center", lineHeight: 1.15,
            maxWidth: "96%", overflow: "hidden",
            whiteSpace: "normal", wordBreak: "break-word",
            marginTop: 1, fontWeight: 500,
            display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical",
          }}>{el.name}</span>
        </div>
      );
    }

    /* ═══════════════════════ APP ═══════════════════════ */

    function App() {
      const [selected, setSelected] = useState(null);
      const [hoveredCat, setHoveredCat] = useState(null);
      const [mounted, setMounted] = useState(false);
      const detailRef = useRef(null);

      useEffect(() => { setMounted(true); }, []);
      useEffect(() => {
        if (selected && detailRef.current)
          detailRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }, [selected]);

      // Close on Escape
      useEffect(() => {
        const handler = e => { if (e.key === 'Escape') { setSelected(null); setHoveredCat(null); } };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const grid = useMemo(() => {
        const g = {};
        elements.forEach(el => { g[`${el.row}-${el.col}`] = el; });
        return g;
      }, []);

      const rows = [0,1,2,3,4,5,6,7];

      return (
        <div style={{ minHeight: "100vh", padding: "24px 16px", maxWidth: 1400, margin: "0 auto" }}>
          {/* Header */}
          <header style={{
            textAlign: "center", marginBottom: 22,
            opacity: mounted ? 1 : 0, transition: "opacity 0.8s",
          }}>
            <div style={{
              display: "inline-block", padding: "3px 14px", borderRadius: 100,
              background: "#f0f0ec", fontSize: 10, fontWeight: 500, color: "#999",
              letterSpacing: "0.12em", textTransform: "uppercase",
              fontFamily: "'DM Mono', monospace", marginBottom: 6,
            }}>128 Elemente · 10 Kategorien</div>
            <h1 style={{
              fontSize: "clamp(20px, 3.5vw, 40px)", fontWeight: 700,
              letterSpacing: "-0.03em", color: "#111", lineHeight: 1.15,
            }}>
              Periodensystem der{" "}
              <span style={{
                background: "linear-gradient(135deg, #C62828, #E65100, #00695C, #6A1B9A, #1565C0)",
                WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
              }}>Künstlichen Intelligenz</span>
            </h1>
            <p style={{ fontSize: 13, color: "#aaa", marginTop: 4 }}>
              Von Foundation Models bis Ethik — das gesamte AI-Ökosystem auf einen Blick.
            </p>
          </header>

          {/* Legend */}
          <nav aria-label="Kategorien" style={{
            display: "flex", flexWrap: "wrap", justifyContent: "center",
            gap: 4, marginBottom: 18,
          }}>
            {catEntries.map(([key, cat]) => {
              const active = hoveredCat === key;
              return (
                <button key={key}
                  onClick={() => setHoveredCat(active ? null : key)}
                  style={{
                    display: "flex", alignItems: "center", gap: 4,
                    padding: "3px 9px", borderRadius: 5, cursor: "pointer",
                    background: active ? cat.light : "#fff",
                    border: `1.5px solid ${active ? cat.color : "#e0e0dc"}`,
                    fontSize: 9, fontWeight: 600,
                    color: active ? cat.color : "#888",
                    fontFamily: "'DM Sans', sans-serif",
                    transition: "all 0.2s",
                  }}
                >
                  <span style={{ width: 7, height: 7, borderRadius: 2, background: cat.color, opacity: active ? 1 : 0.5 }} />
                  {cat.name}
                </button>
              );
            })}
          </nav>

          {/* Main Grid */}
          <div role="grid" aria-label="Periodensystem" style={{
            display: "grid",
            gridTemplateColumns: `repeat(${TOTAL_COLS}, minmax(0, 1fr))`,
            gap: 2.5,
          }}>
            {rows.flatMap(row =>
              Array.from({ length: TOTAL_COLS }, (_, col) => {
                const el = grid[`${row}-${col}`];
                if (!el) return <div key={`${row}-${col}`} />;
                return <Cell key={el.num} el={el} selected={selected} setSelected={setSelected} hoveredCat={hoveredCat} />;
              })
            )}
          </div>

          {/* Extended row label */}
          <div style={{
            display: "flex", alignItems: "center", gap: 8,
            margin: "10px 0 4px", paddingLeft: 2,
          }}>
            <span style={{
              fontSize: 8, color: "#bbb", letterSpacing: "0.08em",
              textTransform: "uppercase", fontWeight: 500, whiteSpace: "nowrap",
              fontFamily: "'DM Mono', monospace",
            }}>★ Extended Foundation Models</span>
            <div style={{ flex: 1, height: 1, background: "#e8e8e4" }} />
          </div>

          {/* Extended row grid */}
          <div style={{
            display: "grid",
            gridTemplateColumns: `repeat(${TOTAL_COLS}, minmax(0, 1fr))`,
            gap: 2.5,
          }}>
            {Array.from({ length: TOTAL_COLS }, (_, col) => {
              const el = grid[`9-${col}`];
              if (!el) return <div key={`ext-${col}`} />;
              return <Cell key={el.num} el={el} selected={selected} setSelected={setSelected} hoveredCat={hoveredCat} />;
            })}
          </div>

          {/* Detail Panel */}
