          {selected && (
            <div ref={detailRef} style={{
              background: "#fff", border: `2px solid ${CATEGORIES[selected.cat].color}`,
              borderRadius: 12, padding: 18, marginTop: 16,
              animation: "slideUp 0.25s ease",
              boxShadow: `0 4px 30px ${CATEGORIES[selected.cat].color}12`,
            }}>
              <div style={{ display: "flex", gap: 14, alignItems: "flex-start", flexWrap: "wrap" }}>
                <div style={{
                  width: 66, height: 66, borderRadius: 10, flexShrink: 0,
                  background: CATEGORIES[selected.cat].light,
                  border: `2px solid ${CATEGORIES[selected.cat].color}`,
                  display: "flex", flexDirection: "column",
                  alignItems: "center", justifyContent: "center",
                }}>
                  <span style={{
                    fontSize: 9, color: CATEGORIES[selected.cat].color, opacity: 0.5,
                    fontFamily: "'DM Mono', monospace",
                  }}>{selected.num}</span>
                  <span style={{
                    fontSize: 24, fontWeight: 700, color: CATEGORIES[selected.cat].color,
                    lineHeight: 1,
                  }}>{selected.sym}</span>
                </div>
                <div style={{ flex: 1, minWidth: 180 }}>
                  <h3 style={{ fontSize: 17, fontWeight: 700, color: "#111", letterSpacing: "-0.02em", margin: 0 }}>
                    {selected.name}
                  </h3>
                  <span style={{
                    display: "inline-block", padding: "2px 10px", borderRadius: 100,
                    background: CATEGORIES[selected.cat].light,
                    color: CATEGORIES[selected.cat].color,
                    fontSize: 10, fontWeight: 600, marginTop: 4,
                    border: `1px solid ${CATEGORIES[selected.cat].mid}`,
                  }}>{CATEGORIES[selected.cat].name}</span>
                  <p style={{ marginTop: 8, fontSize: 14, color: "#555", lineHeight: 1.65 }}>
                    {selected.desc}
                  </p>
                </div>
                <button onClick={e => { e.stopPropagation(); setSelected(null); }}
                  aria-label="Schließen"
                  style={{
                    background: "#f7f7f5", border: "1px solid #e8e8e3",
                    color: "#aaa", borderRadius: 8, width: 30, height: 30,
                    cursor: "pointer", fontSize: 13, display: "flex",
                    alignItems: "center", justifyContent: "center",
                  }}>✕</button>
              </div>
            </div>
          )}

          {/* Stats Footer */}
          <div style={{
            display: "flex", justifyContent: "center", gap: 10,
            marginTop: 24, flexWrap: "wrap",
          }}>
            {catEntries.map(([key, cat]) => {
              const count = elements.filter(e => e.cat === key).length;
              return (
                <div key={key} onClick={() => setHoveredCat(hoveredCat === key ? null : key)}
                  style={{
                    textAlign: "center", padding: "5px 8px", borderRadius: 8, cursor: "pointer",
                    background: hoveredCat === key ? cat.light : "#fff",
                    border: `1px solid ${hoveredCat === key ? cat.mid : "#eee"}`,
                    transition: "all 0.2s", minWidth: 54,
                  }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: cat.color }}>{count}</div>
                  <div style={{
                    fontSize: 6.5, color: "#bbb", textTransform: "uppercase",
                    letterSpacing: "0.05em", fontWeight: 500,
                    fontFamily: "'DM Mono', monospace",
                  }}>{cat.name}</div>
                </div>
              );
            })}
          </div>

          <footer style={{
            textAlign: "center", marginTop: 20, padding: "12px 0",
            borderTop: "1px solid #f0f0ec", fontSize: 10, color: "#ccc",
            fontFamily: "'DM Mono', monospace",
          }}>
            Periodensystem der Künstlichen Intelligenz · 2026 · Klicke auf ein Element für Details
          </footer>
        </div>
      );
    }

    /* ═══════════════════════ MOUNT ═══════════════════════ */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
